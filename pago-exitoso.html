<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago exitoso — Blinky MDQ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0fdf4; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: white; border-radius: 20px; padding: 2.5rem 2rem; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
  .icon { width: 72px; height: 72px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 2rem; }
  h1 { font-size: 1.4rem; font-weight: 900; color: #1e293b; margin-bottom: 0.5rem; }
  p { font-size: 0.9rem; color: #64748b; margin-bottom: 1.5rem; line-height: 1.5; }
  .btn { display: inline-block; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; font-weight: 700; font-size: 0.875rem; padding: 0.75rem 1.75rem; border-radius: 12px; text-decoration: none; }
  .logo { height: 32px; margin-bottom: 1.5rem; }
</style>
</head>
<body>
  <div class="card">
    <img src="https://raw.githubusercontent.com/blinkymdq/blinkymdq/main/blinkysinfondo.png" class="logo" alt="Blinky MDQ">
    <div class="icon">✓</div>
    <h1>¡Pago exitoso!</h1>
    <p>Tu pago fue procesado correctamente. En breve recibirás la confirmación de tu pedido. ¡Gracias por comprar en Blinky MDQ!</p>
    <a href="https://blinkymdq.github.io/blinkymdq/" class="btn">Volver a la tienda</a>
  </div>
</body>
</html>
