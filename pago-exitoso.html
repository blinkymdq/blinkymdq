<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedido enviado — Blinky MDQ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0fdf4; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: white; border-radius: 20px; padding: 2.5rem 2rem; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
  .icon { font-size: 3rem; margin-bottom: 1rem; }
  h1 { font-size: 1.4rem; font-weight: 900; color: #1e293b; margin-bottom: 0.75rem; }
  p { font-size: 0.92rem; color: #64748b; margin-bottom: 1.75rem; line-height: 1.6; }
  .btn { display: inline-block; background: #7c3aed; color: white; font-weight: 700; font-size: 0.95rem; padding: 0.85rem 2rem; border-radius: 12px; text-decoration: none; width: 100%; }
  .logo { height: 32px; margin-bottom: 1.5rem; }
</style>
</head>
<body>
  <div class="card">
    <img src="https://raw.githubusercontent.com/blinkymdq/blinkymdq/main/blinkysinfondo.png" class="logo" alt="Blinky MDQ">

    <h1>¡Pedido enviado con éxito!</h1>
    <p>En breve nos pondremos en contacto para coordinar la entrega.<br><br>¡Gracias por tu compra! 🛍️</p>

  </div>
</body>
</html>
