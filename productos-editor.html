<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Productos — Blinky MDQ</title>
<style>
  :root {
    --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#22223a; --border:#2a2a4a;
    --text:#e2e2f0; --text2:#a0a0c0; --text3:#606080;
    --violet:#7c3aed; --violet-light:#a78bfa; --green:#10b981; --red:#ef4444;
    --cyan:#06b6d4; --yellow:#f59e0b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; min-height:100vh; }

  /* LOGIN */
  #login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:2rem; width:320px; text-align:center; }
  .login-card h2 { font-size:1.1rem; font-weight:900; margin-bottom:1.5rem; color:var(--violet-light); }
  .login-input { background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:0.9rem; padding:0.75rem 1rem; width:100%; margin-bottom:0.75rem; outline:none; }
  .login-input:focus { border-color:var(--violet); }
  .btn-login { background:var(--violet); color:white; border:none; border-radius:10px; padding:0.75rem; width:100%; font-weight:700; cursor:pointer; font-size:0.9rem; }

  /* APP */
  #app { display:none; }
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  .header h1 { font-size:1rem; font-weight:900; color:var(--violet-light); }
  .header-right { display:flex; align-items:center; gap:0.75rem; font-size:0.8rem; color:var(--text2); }

  .container { width:100%; padding:1.5rem; }

  /* FILTROS */
  .filters { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; }
  .filter-input { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.82rem; padding:0.5rem 0.75rem; outline:none; }
  .filter-input:focus { border-color:var(--violet); }
  .btn-refresh { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text2); font-size:0.82rem; padding:0.5rem 0.75rem; cursor:pointer; }
  .btn-refresh:hover { border-color:var(--violet); color:var(--violet-light); }

  /* TABLA */
  .tabla-wrap { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:0.8rem; }
  thead th { padding:10px 12px; text-align:left; color:var(--text3); font-size:0.68rem; text-transform:uppercase; border-bottom:1px solid var(--border); white-space:nowrap; background:var(--surface); position:sticky; top:0; }
  tbody tr:hover { background:var(--surface2); }
  tbody td { padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }

  /* INPUTS en tabla */
  .td-input { background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:0.8rem; padding:4px 8px; width:90px; outline:none; text-align:right; }
  .td-input:focus { border-color:var(--violet); }

  /* PRECIO CALCULADO */
  .precio-calc { font-weight:900; color:var(--violet-light); }
  .precio-mayo { font-weight:700; color:var(--cyan); }

  /* BTN GUARDAR */
  .btn-guardar-row { background:var(--green); color:white; border:none; border-radius:6px; padding:4px 10px; font-size:0.75rem; font-weight:700; cursor:pointer; white-space:nowrap; }
  .btn-guardar-row:hover { background:#059669; }
  .btn-guardar-row.guardado { background:var(--surface2); color:var(--green); border:1px solid var(--green); }

  /* BADGE STOCK */
  .stock-ok { color:var(--green); font-weight:900; }
  .stock-cero { color:var(--red); font-weight:900; }

  /* TOAST */
  #toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--green); color:var(--green); border-radius:10px; padding:10px 18px; font-size:0.82rem; font-weight:700; z-index:999; opacity:0; transition:all 0.3s; pointer-events:none; }
  #toast.err { border-color:var(--red); color:var(--red); }
  #toast.show { opacity:1; }

  .loading-txt { text-align:center; padding:3rem; color:var(--text3); }

  /* MODAL IMAGEN */
  #modal-img { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;align-items:center;justify-content:center;cursor:zoom-out; }
  #modal-img.open { display:flex; }
  #modal-img img { max-width:90vw;max-height:90vh;object-fit:contain;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  #modal-img-info { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:white;border-radius:8px;padding:8px 16px;font-size:0.8rem;text-align:center; }
  .img-thumb { cursor:zoom-in; transition:opacity 0.15s; }
  .img-thumb:hover { opacity:0.8; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h2>🛍 Editor de Productos</h2>
    <input class="login-input" type="password" id="pwd-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter') doLogin()">
    <div id="login-error" style="color:var(--red);font-size:0.75rem;margin-bottom:0.5rem;display:none;">Contraseña incorrecta</div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <h1>📦 Editor de Productos — Blinky MDQ</h1>
    <div class="header-right">
      <span id="total-prods"></span>
      <div style="display:flex;align-items:center;gap:0.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.75rem;">
        <span style="color:var(--yellow);font-weight:700;font-size:0.82rem;">💵 USD</span>
        <input id="dolar-valor" type="number" min="0" value="1200" style="background:transparent;border:none;color:var(--yellow);font-weight:900;font-size:0.9rem;width:80px;outline:none;text-align:right;" oninput="recalcularTodo()">
        <span style="color:var(--text3);font-size:0.75rem;">$/USD</span>
      </div>
      <button class="btn-refresh" onclick="cargarProductos()">↻ Actualizar</button>

    </div>
  </div>

  <div class="container">
    <div class="filters">
      <input class="filter-input" id="buscar" type="text" placeholder="Buscar nombre o código..." oninput="filtrarTabla()" style="min-width:220px;">
      <select class="filter-input" id="filtro-cat" onchange="filtrarTabla()">
        <option value="">Todas las categorías</option>
      </select>
      <select class="filter-input" id="filtro-stock" onchange="filtrarTabla()">
        <option value="">Todo el stock</option>
        <option value="sin">Sin stock</option>
        <option value="con">Con stock</option>
      </select>
    </div>

    <div class="tabla-wrap">
      <div id="tabla-contenido"><div class="loading-txt">Cargando productos...</div></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- MODAL IMAGEN -->
<div id="modal-img" onclick="cerrarModalImg()">
  <img id="modal-img-src" src="" alt="">
  <div id="modal-img-info"></div>
</div>

<script>
const SUPA_URL = 'https://fcaytkwcypktvrmerexp.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjYXl0a3djeXBrdHZybWVyZXhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDU1OTYsImV4cCI6MjA5NzM4MTU5Nn0.7GiUl0o_B3dAnpE2x98sBqtC0eY9HoM6p67fOBghoJY';
const PASS = 'blinky2024';
const hdrs = {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=representation'};

let todosLosProductos = [];

function doLogin() {
  if(document.getElementById('pwd-input').value === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    cargarProductos();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
  }
}

function getImgUrl(foto) {
  if (!foto || foto.trim() === '') return '';
  if (foto.includes('id=')) return `https://drive.google.com/thumbnail?id=${foto.split('id=')[1].split('&')[0]}&sz=100`;
  return `https://blinkymdq.com/Productos/${foto}.jpg`;
}

function calcCostoPesos(costoUsd, impE, dolar) {
  const c = parseFloat(costoUsd) || 0;
  const e = parseFloat(impE) || 0;
  const d = parseFloat(dolar) || 0;
  if (!c) return 0;
  return Math.round(c * (1 + e / 100) * d);
}

function calcPrecioDesde(costoPesos, impuestos, ganancia) {
  const c = parseFloat(costoPesos) || 0;
  const i = parseFloat(impuestos) || 0;
  const g = parseFloat(ganancia) || 0;
  if (!c) return 0;
  return Math.round(c * (1 + i/100) * (1 + g/100));
}

function calcPrecio(costo, impuestos, ganancia) {
  return calcPrecioDesde(costo, impuestos, ganancia);
}

function fmt(n) {
  return '$' + Math.round(n||0).toLocaleString('es-AR');
}

function abrirModalImg(url, nombre, fotoRaw) {
  const modal = document.getElementById('modal-img');
  const img = document.getElementById('modal-img-src');
  const info = document.getElementById('modal-img-info');
  if(!url) { toast('Este producto no tiene foto cargada', 'err'); return; }
  img.src = url.replace('sz=100','sz=800'); // mayor resolución
  img.onerror = () => { info.textContent = `⚠️ Error al cargar imagen · Valor en Sheets: "${fotoRaw}"`; };
  info.textContent = nombre;
  modal.classList.add('open');
  document.addEventListener('keydown', cerrarConEsc);
}

function cerrarModalImg() {
  document.getElementById('modal-img').classList.remove('open');
  document.removeEventListener('keydown', cerrarConEsc);
}

function cerrarConEsc(e) { if(e.key==='Escape') cerrarModalImg(); }


function recalcularTodo() {
  todosLosProductos.forEach(p => actualizarCalc(p.id));
}

function actualizarCalc(id) {
  const dolar    = parseFloat(document.getElementById('dolar-valor')?.value) || 0;
  const costoUsd = document.getElementById(`costoUsd-${id}`)?.value;
  const impE     = document.getElementById(`envioUsd-${id}`)?.value; // Imp.E %
  const gan      = document.getElementById(`gan-${id}`)?.value;
  const ganM     = document.getElementById(`ganmay-${id}`)?.value;

  const costoTotal = calcCostoPesos(costoUsd, impE, dolar);
  const pub = calcPrecioDesde(costoTotal, 0, gan);
  const may = calcPrecioDesde(costoTotal, 0, ganM);

  const elCostoTotal = document.getElementById(`costo-pesos-${id}`);
  const elPub = document.getElementById(`calc-pub-${id}`);
  const elMay = document.getElementById(`calc-may-${id}`);

  if(elCostoTotal) elCostoTotal.textContent = costoTotal ? fmt(costoTotal) : '-';
  if(elPub) elPub.textContent = pub ? fmt(pub) : '-';
  if(elMay) elMay.textContent = may ? fmt(may) : '-';

  const btn = document.getElementById(`btn-${id}`);
  if(btn) { btn.textContent='Guardar'; btn.classList.remove('guardado'); }
}

async function guardarProducto(id) {
  const dolar    = parseFloat(document.getElementById('dolar-valor')?.value) || 0;
  const costoUsd = parseFloat(document.getElementById(`costoUsd-${id}`)?.value) || null;
  const impE     = parseFloat(document.getElementById(`envioUsd-${id}`)?.value) || null; // Imp.E %
  const gan      = parseFloat(document.getElementById(`gan-${id}`)?.value) || null;
  const ganM     = parseFloat(document.getElementById(`ganmay-${id}`)?.value) || null;

  const costoTotal    = calcCostoPesos(costoUsd, impE, dolar) || null;
  const precioPublico = calcPrecioDesde(costoTotal, 0, gan) || null;
  const precioMayor   = calcPrecioDesde(costoTotal, 0, ganM) || null;

  const body = {
    costo_usd: costoUsd,
    imp_e: impE,
    costo_final: costoTotal,
    ganancia_min: gan,
    ganancia_mayorista: ganM
  };
  if(precioPublico) body.precio_publico = precioPublico;
  if(precioMayor)   body.precio_mayorista = precioMayor;

  try {
    await fetch(`${SUPA_URL}/rest/v1/lista_provisoria?codigo=eq.${encodeURIComponent(p.codigo)}`, {
      method:'PATCH', headers:hdrs, body:JSON.stringify(body)
    });
    const p = todosLosProductos.find(x=>x.id===id);
    if(p) { p.costo_usd=costoUsd; p.imp_e=impE; p.costo_final=costoTotal; p.ganancia_min=gan; p.ganancia_mayorista=ganM; if(precioPublico) p.precio_publico=precioPublico; if(precioMayor) p.precio_mayorista=precioMayor; }
    const btn = document.getElementById(`btn-${id}`);
    if(btn) { btn.textContent='✓ Guardado'; btn.classList.add('guardado'); }
    toast('Guardado ✓', 'ok');
  } catch(e) { toast('Error al guardar', 'err'); }
}

async function cargarProductos() {
  document.getElementById('tabla-contenido').innerHTML = '<div class="loading-txt">Cargando...</div>';
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/lista_provisoria?order=nombre.asc`, {headers:hdrs});
    todosLosProductos = await res.json();

    // Poblar categorías
    const cats = [...new Set(todosLosProductos.map(p=>p.categoria).filter(Boolean))].sort();
    const sel = document.getElementById('filtro-cat');
    const valActual = sel.value;
    sel.innerHTML = '<option value="">Todas las categorías</option>' + cats.map(c=>`<option value="${c}" ${c===valActual?'selected':''}>${c}</option>`).join('');

    document.getElementById('total-prods').textContent = `${todosLosProductos.length} productos`;
    filtrarTabla();
  } catch(e) {
    document.getElementById('tabla-contenido').innerHTML = '<div class="loading-txt">Error al cargar</div>';
  }
}

function filtrarTabla() {
  const q = document.getElementById('buscar').value.toLowerCase();
  const cat = document.getElementById('filtro-cat').value;
  const stock = document.getElementById('filtro-stock').value;

  let prods = todosLosProductos.filter(p => {
    const matchQ = !q || (p.nombre||'').toLowerCase().includes(q) || (p.codigo||'').toLowerCase().includes(q);
    const matchCat = !cat || p.categoria === cat;
    const matchStock = !stock || (stock==='sin' ? !p.stock||p.stock<=0 : p.stock>0);
    return matchQ && matchCat && matchStock;
  });

  renderTabla(prods);
}

function renderTabla(prods) {
  if (!prods.length) {
    document.getElementById('tabla-contenido').innerHTML = '<div class="loading-txt">Sin resultados</div>';
    return;
  }

  document.getElementById('tabla-contenido').innerHTML = `
    <table>
      <thead><tr>
        <th>Foto</th>
        <th>Código</th>
        <th>Nombre</th>
        <th>Marca</th>
        <th>Categoría</th>
        <th style="text-align:right;">Stock</th>
        <th style="text-align:right;color:var(--yellow);">Costo USD</th>
        <th style="text-align:right;color:var(--yellow);">Imp.E %</th>
        <th style="text-align:right;color:var(--yellow);">Costo Total</th>
        <th style="text-align:right;">Gan. Min. %</th>
        <th style="text-align:right;">P. Público</th>
        <th style="text-align:right;">Gan. May. %</th>
        <th style="text-align:right;">P. Mayor.</th>
        <th></th>
      </tr></thead>
      <tbody>
        ${prods.map(p => {
          const dolar = parseFloat(document.getElementById('dolar-valor')?.value) || 1200;
          const costoTotal = calcCostoPesos(p.costo_usd, p.imp_e, dolar);
          const costoBase = costoTotal || parseFloat(p.costo) || 0;
          const precioPublico = calcPrecioDesde(costoBase, 0, p.ganancia_min);
          const precioMayor = calcPrecioDesde(costoBase, 0, p.ganancia_mayorista);
          return `<tr id="row-${p.id}">
            <td><img src="${getImgUrl((p.foto||'').split(',')[0].trim())}" class="img-thumb" style="width:36px;height:36px;object-fit:contain;border-radius:6px;background:var(--surface2);" onerror="this.style.opacity='0.2';this.title='Sin foto o error al cargar'" onclick="abrirModalImg('${getImgUrl((p.foto||'').split(',')[0].trim())}','${p.nombre}','${p.foto||''}')"></td>
            <td style="color:var(--text3);font-family:monospace;font-size:0.75rem;">${p.codigo||'-'}</td>
            <td style="font-weight:700;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${p.nombre}">${p.nombre}</td>
            <td style="color:var(--text2);">${p.marca||'-'}</td>
            <td style="color:var(--text2);">${p.categoria||'-'}</td>
            <td style="text-align:right;"><span class="${(p.stock||0)>0?'stock-ok':'stock-cero'}">${p.stock||0}</span></td>
            <td style="text-align:right;"><input class="td-input" id="costoUsd-${p.id}" type="number" min="0" step="0.01" value="${p.costo_usd||''}" placeholder="0" oninput="actualizarCalc(${p.id})" style="border-color:rgba(245,158,11,0.3);"></td>
            <td style="text-align:right;"><input class="td-input" id="envioUsd-${p.id}" type="number" min="0" step="0.01" value="${p.imp_e||''}" placeholder="0" oninput="actualizarCalc(${p.id})" style="border-color:rgba(245,158,11,0.3);"></td>
            <td style="text-align:right;"><span style="font-weight:700;color:var(--yellow);" id="costo-pesos-${p.id}">${costoTotal ? fmt(costoTotal) : (p.costo ? fmt(p.costo) : '-')}</span></td>
            <td style="text-align:right;"><input class="td-input" id="gan-${p.id}" type="number" min="0" value="${p.ganancia_min||''}" placeholder="0" oninput="actualizarCalc(${p.id})"></td>
            <td style="text-align:right;"><span class="precio-calc" id="calc-pub-${p.id}">${precioPublico ? fmt(precioPublico) : (p.precio_publico ? fmt(p.precio_publico) : '-')}</span></td>
            <td style="text-align:right;"><input class="td-input" id="ganmay-${p.id}" type="number" min="0" value="${p.ganancia_mayorista||''}" placeholder="0" oninput="actualizarCalc(${p.id})"></td>
            <td style="text-align:right;"><span class="precio-mayo" id="calc-may-${p.id}">${precioMayor ? fmt(precioMayor) : (p.precio_mayorista ? fmt(p.precio_mayorista) : '-')}</span></td>
            <td><button class="btn-guardar-row" id="btn-${p.id}" onclick="guardarProducto(${p.id})">Guardar</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function toast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = tipo === 'err' ? 'err show' : 'show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 2500);
}

document.getElementById('pwd-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
