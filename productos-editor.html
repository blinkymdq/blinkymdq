<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Productos — Blinky MDQ</title>
<style>
  :root {
    --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#22223a; --border:#2a2a4a;
    --text:#e2e2f0; --text2:#a0a0c0; --text3:#606080;
    --violet:#7c3aed; --violet-light:#a78bfa; --green:#10b981; --red:#ef4444;
    --cyan:#06b6d4; --yellow:#f59e0b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; min-height:100vh; }

  /* LOGIN */
  #login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:2rem; width:320px; text-align:center; }
  .login-card h2 { font-size:1.1rem; font-weight:900; margin-bottom:1.5rem; color:var(--violet-light); }
  .login-input { background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:0.9rem; padding:0.75rem 1rem; width:100%; margin-bottom:0.75rem; outline:none; }
  .login-input:focus { border-color:var(--violet); }
  .btn-login { background:var(--violet); color:white; border:none; border-radius:10px; padding:0.75rem; width:100%; font-weight:700; cursor:pointer; font-size:0.9rem; }

  /* APP */
  #app { display:none; }
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  .header h1 { font-size:1rem; font-weight:900; color:var(--violet-light); }
  .header-right { display:flex; align-items:center; gap:0.75rem; font-size:0.8rem; color:var(--text2); }

  .container { width:100%; padding:1.5rem; }

  /* FILTROS */
  .filters { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; }
  .filter-input { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.82rem; padding:0.5rem 0.75rem; outline:none; }
  .filter-input:focus { border-color:var(--violet); }
  .btn-refresh { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text2); font-size:0.82rem; padding:0.5rem 0.75rem; cursor:pointer; }
  .btn-refresh:hover { border-color:var(--violet); color:var(--violet-light); }

  /* TABLA */
  .tabla-wrap { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:0.8rem; }
  thead th { padding:10px 12px; text-align:left; color:var(--text3); font-size:0.68rem; text-transform:uppercase; border-bottom:1px solid var(--border); white-space:nowrap; background:var(--surface); position:sticky; top:0; }
  tbody tr:hover { background:var(--surface2); }
  tbody td { padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }

  /* INPUTS en tabla */
  .td-input { background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:0.8rem; padding:4px 8px; width:90px; outline:none; text-align:right; }
  .td-input:disabled { opacity:0.35; cursor:not-allowed; }
  .btn-editar-row { background:var(--surface2); color:var(--violet-light); border:1px solid var(--violet); border-radius:6px; padding:4px 10px; font-size:0.75rem; font-weight:700; cursor:pointer; white-space:nowrap; }
  .btn-editar-row:hover { background:var(--violet); color:white; }

  /* PRECIO CALCULADO */
  .precio-calc { font-weight:900; color:var(--green); }
  .precio-mayo { font-weight:700; color:var(--violet-light); }

  /* BTN GUARDAR */
  .btn-guardar-row { background:var(--green); color:white; border:none; border-radius:6px; padding:4px 10px; font-size:0.75rem; font-weight:700; cursor:pointer; white-space:nowrap; }
  .btn-guardar-row:hover { background:#059669; }
  .btn-guardar-row.guardado { background:var(--surface2); color:var(--green); border:1px solid var(--green); }

  /* BADGE STOCK */
  .stock-ok { color:var(--green); font-weight:900; }
  .stock-cero { color:var(--red); font-weight:900; }

  /* TOAST */
  #toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--green); color:var(--green); border-radius:10px; padding:10px 18px; font-size:0.82rem; font-weight:700; z-index:999; opacity:0; transition:all 0.3s; pointer-events:none; }
  #toast.err { border-color:var(--red); color:var(--red); }
  #toast.show { opacity:1; }

  .loading-txt { text-align:center; padding:3rem; color:var(--text3); }

  /* MODAL IMAGEN */
  #modal-img { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;align-items:center;justify-content:center;cursor:zoom-out; }
  #modal-img.open { display:flex; }
  #modal-img img { max-width:90vw;max-height:90vh;object-fit:contain;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  #modal-img-info { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:white;border-radius:8px;padding:8px 16px;font-size:0.8rem;text-align:center; }

  /* MODAL GESTIÓN DE FOTOS */
  #modal-fotos { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:998; align-items:center; justify-content:center; padding:1rem; }
  #modal-fotos.open { display:flex; }
  .modal-fotos-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.5rem; width:100%; max-width:520px; max-height:85vh; overflow-y:auto; }
  .modal-fotos-card h3 { font-size:0.95rem; color:var(--violet-light); margin-bottom:1rem; }
  .modal-fotos-actions { display:flex; justify-content:flex-end; gap:0.6rem; margin-top:1.2rem; }
  .btn-modal-cancelar { background:var(--surface2); border:1px solid var(--border); color:var(--text2); border-radius:8px; padding:0.6rem 1.1rem; font-weight:700; font-size:0.82rem; cursor:pointer; }
  .btn-modal-guardar { background:var(--green); border:none; color:white; border-radius:8px; padding:0.6rem 1.1rem; font-weight:700; font-size:0.82rem; cursor:pointer; }
  .btn-modal-guardar:disabled { opacity:0.5; cursor:not-allowed; }
  .img-thumb { cursor:zoom-in; transition:opacity 0.15s; }
  .img-thumb:hover { opacity:0.8; }

  /* TABS */
  .tabs { display:flex; gap:0.5rem; margin-bottom:1rem; }
  .tab-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text2); font-size:0.85rem; font-weight:700; padding:0.6rem 1.1rem; cursor:pointer; }
  .tab-btn.active { background:var(--violet); border-color:var(--violet); color:white; }

  /* FORM NUEVO PRODUCTO */
  .form-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.5rem; max-width:640px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.9rem; }
  .form-field { display:flex; flex-direction:column; gap:0.3rem; }
  .form-field.full { grid-column:1 / -1; }
  .form-field label { font-size:0.72rem; color:var(--text3); text-transform:uppercase; font-weight:700; }
  .form-field input, .form-field textarea { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.85rem; padding:0.6rem 0.75rem; outline:none; font-family:inherit; }
  .form-field input:focus, .form-field textarea:focus { border-color:var(--violet); }
  .form-field textarea { resize:vertical; min-height:70px; }

  .foto-drop { border:2px dashed var(--border); border-radius:10px; padding:1.2rem; text-align:center; cursor:pointer; color:var(--text3); font-size:0.8rem; }
  .foto-drop:hover { border-color:var(--violet); color:var(--violet-light); }
  .foto-previews { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.75rem; }
  .foto-preview { position:relative; width:64px; height:64px; }
  .foto-preview img { width:100%; height:100%; object-fit:cover; border-radius:8px; background:var(--surface2); }
  .foto-preview .del-foto { position:absolute; top:-6px; right:-6px; background:var(--red); color:white; border:none; border-radius:50%; width:18px; height:18px; font-size:0.7rem; cursor:pointer; line-height:1; }

  .btn-crear { background:var(--green); color:white; border:none; border-radius:10px; padding:0.75rem 1.5rem; font-weight:700; font-size:0.88rem; cursor:pointer; margin-top:0.5rem; }
  .btn-crear:hover { background:#059669; }
  .btn-crear:disabled { opacity:0.5; cursor:not-allowed; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h2>🛍 Editor de Productos</h2>
    <input class="login-input" type="password" id="pwd-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter') doLogin()">
    <div id="login-error" style="color:var(--red);font-size:0.75rem;margin-bottom:0.5rem;display:none;">Contraseña incorrecta</div>
    <button class="btn-login" onclick="window.doLogin && doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <h1><a href="blinky-panel.html" style="color:inherit;text-decoration:none;">← 📦 Editor de Productos — Blinky MDQ</a></h1>
    <div class="header-right">
      <span id="total-prods"></span>
      <div style="display:flex;align-items:center;gap:0.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.75rem;">
        <span style="color:var(--yellow);font-weight:700;font-size:0.82rem;">💵 USD</span>
        <span id="dolar-display" style="color:var(--yellow);font-weight:900;font-size:0.9rem;min-width:80px;text-align:right;cursor:default;">1200</span>
        <input id="dolar-valor" type="number" min="0" style="background:transparent;border:none;color:var(--yellow);font-weight:900;font-size:0.9rem;width:80px;outline:none;text-align:right;display:none;" oninput="recalcularTodo()">
        <span style="color:var(--text3);font-size:0.75rem;">$/USD</span>
        <button id="btn-dolar-editar" onclick="editarDolar()" style="background:none;border:1px solid var(--violet);border-radius:5px;color:var(--violet-light);font-size:0.7rem;font-weight:700;padding:2px 7px;cursor:pointer;">Editar</button>
        <button id="btn-dolar-guardar" onclick="guardarDolar()" style="background:var(--green);border:none;border-radius:5px;color:white;font-size:0.7rem;font-weight:700;padding:2px 7px;cursor:pointer;display:none;">Guardar</button>
      </div>
      <button class="btn-refresh" onclick="cargarProductos()">↻ Actualizar</button>

    </div>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" id="tabbtn-productos" onclick="switchTab('productos')">📦 Productos</button>
      <button class="tab-btn" id="tabbtn-nuevo" onclick="switchTab('nuevo')">➕ Nuevo producto</button>
    </div>

    <div id="tab-productos">
      <div class="filters">
        <input class="filter-input" id="buscar" type="text" placeholder="Buscar nombre o código..." oninput="filtrarTabla()" style="min-width:220px;">
        <select class="filter-input" id="filtro-cat" onchange="filtrarTabla()">
          <option value="">Todas las categorías</option>
        </select>
        <select class="filter-input" id="filtro-marca" onchange="filtrarTabla()">
          <option value="">Todas las marcas</option>
        </select>
        <select class="filter-input" id="filtro-stock" onchange="filtrarTabla()">
          <option value="">Todo el stock</option>
          <option value="sin">Sin stock</option>
          <option value="con">Con stock</option>
        </select>
      </div>

      <div class="tabla-wrap">
        <div id="tabla-contenido"><div class="loading-txt">Cargando productos...</div></div>
      </div>
    </div>

    <div id="tab-nuevo" style="display:none;">
      <div class="form-card">
        <div class="form-grid">
          <div class="form-field">
            <label>Código (automático)</label>
            <input type="text" id="np-codigo" readonly style="opacity:0.7;cursor:not-allowed;" placeholder="...">
          </div>
          <div class="form-field">
            <label>Nombre *</label>
            <input type="text" id="np-nombre" placeholder="Ej: Perfume Bora Bora">
          </div>
          <div class="form-field">
            <label>Marca</label>
            <input type="text" id="np-marca" list="np-marca-list" placeholder="Ej: Natura">
            <datalist id="np-marca-list"></datalist>
          </div>
          <div class="form-field">
            <label>Categoría</label>
            <input type="text" id="np-categoria" list="np-cat-list" placeholder="Ej: Perfumes">
            <datalist id="np-cat-list"></datalist>
          </div>
          <div class="form-field">
            <label>Stock</label>
            <input type="number" id="np-stock" min="0" placeholder="0">
          </div>
          <div class="form-field">
            <label>Estado</label>
            <select id="np-estado">
              <option value="activo">Activo</option>
              <option value="oferta">Oferta</option>
              <option value="inactivo">Inactivo</option>
            </select>
          </div>
          <div class="form-field">
            <label>Costo USD</label>
            <input type="number" id="np-costo-usd" min="0" step="0.01" placeholder="0.00" oninput="actualizarCalcNuevo()">
          </div>
          <div class="form-field">
            <label>Imp. E %</label>
            <input type="number" id="np-imp-e" min="0" step="0.01" placeholder="0" oninput="actualizarCalcNuevo()">
          </div>
          <div class="form-field">
            <label>Gan. Minorista %</label>
            <input type="number" id="np-gan-min" min="0" placeholder="0" oninput="actualizarCalcNuevo()">
          </div>
          <div class="form-field">
            <label>Gan. Mayorista %</label>
            <input type="number" id="np-gan-may" min="0" placeholder="0" oninput="actualizarCalcNuevo()">
          </div>
          <div class="form-field">
            <label>Costo Total ($)</label>
            <div class="td-input" id="np-costo-total-preview" style="border:none;background:var(--surface2);text-align:right;font-weight:700;color:var(--yellow);width:100%;">-</div>
          </div>
          <div class="form-field">
            <label>Precio Público</label>
            <div class="td-input precio-calc" id="np-precio-pub-preview" style="border:none;background:var(--surface2);text-align:right;width:100%;">-</div>
          </div>
          <div class="form-field">
            <label>Precio Mayorista</label>
            <div class="td-input precio-mayo" id="np-precio-may-preview" style="border:none;background:var(--surface2);text-align:right;width:100%;">-</div>
          </div>
          <div class="form-field full">
            <label>Descripción</label>
            <textarea id="np-descripcion" placeholder="Ej: Perfume de notas frescas, con notas de lavanda y cítricos..."></textarea>
          </div>
          <div class="form-field full">
            <label>Fotos</label>
            <div class="foto-drop" onclick="document.getElementById('np-fotos-input').click()">📷 Click para elegir una o más fotos</div>
            <input type="file" id="np-fotos-input" accept="image/*" multiple style="display:none;" onchange="onFotosSeleccionadas(event)">
            <div class="foto-previews" id="np-foto-previews"></div>
            <div id="np-foto-total" style="font-size:0.72rem;color:var(--text3);margin-top:0.4rem;"></div>
          </div>
        </div>
        <button class="btn-crear" id="btn-crear-producto" onclick="crearProducto()">Crear producto</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- MODAL IMAGEN -->
<div id="modal-img" onclick="cerrarModalImg()">
  <img id="modal-img-src" src="" alt="">
  <div id="modal-img-info"></div>
</div>

<!-- MODAL GESTIÓN DE FOTOS -->
<div id="modal-fotos">
  <div class="modal-fotos-card">
    <h3 id="modal-fotos-titulo">Fotos del producto</h3>
    <div class="foto-previews" id="mf-actuales"></div>
    <div class="foto-drop" style="margin-top:1rem;" onclick="document.getElementById('mf-input').click()">📷 Click para agregar más fotos</div>
    <input type="file" id="mf-input" accept="image/*" multiple style="display:none;" onchange="onFotosModalSeleccionadas(event)">
    <div class="foto-previews" id="mf-nuevas"></div>
    <div class="modal-fotos-actions">
      <button class="btn-modal-cancelar" onclick="cerrarModalFotos()">Cancelar</button>
      <button class="btn-modal-guardar" id="mf-btn-guardar" onclick="guardarFotosProducto()">Guardar fotos</button>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://fcaytkwcypktvrmerexp.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjYXl0a3djeXBrdHZybWVyZXhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDU1OTYsImV4cCI6MjA5NzM4MTU5Nn0.7GiUl0o_B3dAnpE2x98sBqtC0eY9HoM6p67fOBghoJY';
const hdrs = {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=representation'};
const PASS = '727272';

let todosLosProductos = [];
let sortField = null;
let sortDir = 1;

// ── DÓLAR ──────────────────────────────────────
async function initDolar() {
  let val = 1200;
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/configuracion?select=dolar&id=eq.1`, {headers:hdrs});
    const data = await res.json();
    if (data && data[0] && data[0].dolar) val = parseFloat(data[0].dolar);
  } catch(e) {
    console.error('No se pudo cargar el dólar desde Supabase, uso valor por defecto', e);
  }
  document.getElementById('dolar-valor').value = val;
  document.getElementById('dolar-display').textContent = val.toLocaleString('es-AR');
}

function editarDolar() {
  const display = document.getElementById('dolar-display');
  const input   = document.getElementById('dolar-valor');
  const btnE    = document.getElementById('btn-dolar-editar');
  const btnG    = document.getElementById('btn-dolar-guardar');
  display.style.display = 'none';
  input.style.display   = 'block';
  btnE.style.display    = 'none';
  btnG.style.display    = 'block';
  input.focus();
  input.select();
}

async function guardarDolar() {
  const display = document.getElementById('dolar-display');
  const input   = document.getElementById('dolar-valor');
  const btnE    = document.getElementById('btn-dolar-editar');
  const btnG    = document.getElementById('btn-dolar-guardar');
  const val = parseFloat(input.value) || 1200;
  input.value = val;
  display.textContent = val.toLocaleString('es-AR');
  btnG.disabled = true; btnG.textContent = '...';
  try {
    await fetch(`${SUPA_URL}/rest/v1/configuracion?id=eq.1`, {
      method: 'PATCH', headers: hdrs,
      body: JSON.stringify({ dolar: val, updated_at: new Date().toISOString() })
    });
    toast('Dólar actualizado ✓', 'ok');
  } catch(e) {
    toast('Error al guardar el dólar', 'err');
  }
  btnG.disabled = false; btnG.textContent = 'Guardar';
  display.style.display = 'block';
  input.style.display   = 'none';
  btnE.style.display    = 'block';
  btnG.style.display    = 'none';
  recalcularTodo();
}

async function iniciarApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await initDolar();
  cargarProductos();
}

function doLogin() {
  if (document.getElementById('pwd-input').value === PASS) {
    localStorage.setItem('blinky_auth', '1');
    iniciarApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
  }
}

// Si ya está logueado en blinky-panel.html (misma sessionStorage), entra directo
if (localStorage.getItem('blinky_auth') === '1') {
  iniciarApp();
}

document.getElementById('pwd-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function getImgUrl(foto) {
  if (!foto || foto.trim() === '') return '';
  if (foto.startsWith('http')) return foto;
  if (foto.includes('id=')) return `https://drive.google.com/thumbnail?id=${foto.split('id=')[1].split('&')[0]}&sz=100`;
  return `https://blinkymdq.com/Productos/${foto}.jpg`;
}

// ── TABS ───────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-productos').style.display = tab === 'productos' ? 'block' : 'none';
  document.getElementById('tab-nuevo').style.display = tab === 'nuevo' ? 'block' : 'none';
  document.getElementById('tabbtn-productos').classList.toggle('active', tab === 'productos');
  document.getElementById('tabbtn-nuevo').classList.toggle('active', tab === 'nuevo');
  if (tab === 'nuevo') { poblarDatalists(); mostrarProximoCodigo(); }
}

function poblarDatalists() {
  const marcas = [...new Set(todosLosProductos.map(p=>p.marca).filter(Boolean))].sort();
  const cats = [...new Set(todosLosProductos.map(p=>p.categoria).filter(Boolean))].sort();
  document.getElementById('np-marca-list').innerHTML = marcas.map(m=>`<option value="${m}">`).join('');
  document.getElementById('np-cat-list').innerHTML = cats.map(c=>`<option value="${c}">`).join('');
}

// ── CÓDIGO AUTOMÁTICO ───────────────────────────
async function obtenerProximoCodigo() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/productos?select=codigo`, {headers:hdrs});
    const rows = await res.json();
    let max = 0;
    rows.forEach(r => {
      const n = parseInt(r.codigo, 10);
      if (!isNaN(n) && n > max) max = n;
    });
    return String(max + 1);
  } catch(e) {
    console.error('Error calculando próximo código', e);
    // Fallback: usar lo que ya tenemos cargado en memoria
    let max = 0;
    todosLosProductos.forEach(p => {
      const n = parseInt(p.codigo, 10);
      if (!isNaN(n) && n > max) max = n;
    });
    return String(max + 1);
  }
}

const STORAGE_BUCKET = 'productos-fotos';
let fotosSeleccionadas = [];

const FOTO_MAX_ANCHO = 1200;
const FOTO_CALIDAD = 0.8;

function comprimirImagen(file) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith('image/')) { resolve(file); return; }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > FOTO_MAX_ANCHO) {
        height = Math.round(height * (FOTO_MAX_ANCHO / width));
        width = FOTO_MAX_ANCHO;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        if (!blob) { resolve(file); return; }
        const nombre = file.name.replace(/\.[^.]+$/, '') + '.jpg';
        resolve(new File([blob], nombre, { type: 'image/jpeg' }));
      }, 'image/jpeg', FOTO_CALIDAD);
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
    img.src = url;
  });
}

}

function fmtKB(bytes) {
  return bytes > 1024*1024 ? (bytes/1024/1024).toFixed(1)+'MB' : Math.round(bytes/1024)+'KB';
}

function renderFotoPreviews() {
  const cont = document.getElementById('np-foto-previews');
  cont.innerHTML = fotosSeleccionadas.map((file, i) => `
    <div class="foto-preview">

      <div style="position:absolute;bottom:-2px;left:0;right:0;background:rgba(0,0,0,0.7);color:#fff;font-size:0.6rem;text-align:center;border-radius:0 0 8px 8px;padding:1px 0;">${fmtKB(file.size)}</div>
    </div>`).join('');
  const totalKB = fotosSeleccionadas.reduce((s,f)=>s+f.size, 0);
  const totalEl = document.getElementById('np-foto-total');
  if (fotosSeleccionadas.length && totalEl) totalEl.textContent = `Total: ${fmtKB(totalKB)}`;
}

async function subirFotos(codigo, archivos) {
  const urls = [];
  for (const file of archivos) {
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const path = `${codigo}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
    const res = await fetch(`${SUPA_URL}/storage/v1/object/${STORAGE_BUCKET}/${path}`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': file.type || 'image/jpeg' },
      body: file
    });
    if (!res.ok) {
      const errTxt = await res.text().catch(()=> '');
      throw new Error(`Error subiendo ${file.name}: ${errTxt}`);
    }
    urls.push(`${SUPA_URL}/storage/v1/object/public/${STORAGE_BUCKET}/${path}`);
  }
  return urls;
}

async function crearProducto() {
  const nombre = document.getElementById('np-nombre').value.trim();
  if (!nombre) { toast('El nombre es obligatorio', 'err'); return; }

  const btn = document.getElementById('btn-crear-producto');
  btn.disabled = true; btn.textContent = 'Creando...';

  try {
    // Recalculamos el código justo acá para minimizar la ventana de carrera
    let codigo = await obtenerProximoCodigo();
    document.getElementById('np-codigo').value = codigo;

    let fotoField = '';
    if (fotosSeleccionadas.length) {
      btn.textContent = 'Subiendo fotos...';
      const urls = await subirFotos(codigo, fotosSeleccionadas);
      fotoField = urls.join(',');
    }

    const dolar = parseFloat(document.getElementById('dolar-valor')?.value) || 0;
    const costoUsd = parseFloat(document.getElementById('np-costo-usd').value) || null;
    const impE = parseFloat(document.getElementById('np-imp-e').value) || null;
    const ganMin = parseFloat(document.getElementById('np-gan-min').value) || null;
    const ganMay = parseFloat(document.getElementById('np-gan-may').value) || null;
    const costoTotal = calcCostoPesos(costoUsd, impE, dolar) || null;
    const precioPublico = calcPrecioDesde(costoTotal, 0, ganMin) || null;
    const precioMayor = calcPrecioDesde(costoTotal, 0, ganMay) || null;

    const bodyBase = {
      nombre,
      marca: document.getElementById('np-marca').value.trim() || null,
      categoria: document.getElementById('np-categoria').value.trim() || null,
      stock: parseInt(document.getElementById('np-stock').value) || 0,
      estado: document.getElementById('np-estado').value,
      costo_usd: costoUsd,
      imp_e: impE,
      costo_final: costoTotal,
      ganancia: ganMin,
      ganancia_mayorista: ganMay,
      precio_publico: precioPublico,
      precio_mayorista: precioMayor,
      descripcion: document.getElementById('np-descripcion').value.trim() || null,
      foto: fotoField || null
    };

    btn.textContent = 'Guardando...';

    let intentos = 0;
    let guardado = false;
    while (!guardado && intentos < 3) {
      intentos++;
      const res = await fetch(`${SUPA_URL}/rest/v1/productos`, {
        method: 'POST', headers: hdrs, body: JSON.stringify({ codigo, ...bodyBase })
      });
      if (res.ok) {
        guardado = true;
      } else {
        const errTxt = await res.text().catch(()=> '');
        const esConflicto = res.status === 409 || /duplicate|unique/i.test(errTxt);
        if (esConflicto && intentos < 3) {
          codigo = await obtenerProximoCodigo();
          document.getElementById('np-codigo').value = codigo;
        } else {
          throw new Error(errTxt || `HTTP ${res.status}`);
        }
      }
    }

    toast(`Producto ${codigo} creado ✓`, 'ok');
    limpiarFormNuevo();
    await cargarProductos();
    switchTab('productos');
  } catch (e) {
    console.error(e);
    toast('Error al crear producto', 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Crear producto';
  }
}

function calcCostoPesos(costoUsd, impE, dolar) {
  const c = parseFloat(costoUsd) || 0;
  const e = parseFloat(impE) || 0;
  const d = parseFloat(dolar) || 0;
  if (!c) return 0;
  return Math.round(c * (1 + e / 100) * d);
}

function calcPrecioDesde(costoPesos, impuestos, ganancia) {
  const c = parseFloat(costoPesos) || 0;
  const i = parseFloat(impuestos) || 0;
  const g = parseFloat(ganancia) || 0;
  if (!c) return 0;
  return Math.round(c * (1 + i/100) * (1 + g/100));
}

function calcPrecio(costo, impuestos, ganancia) {
  return calcPrecioDesde(costo, impuestos, ganancia);
}

function fmt(n) {
  return '$' + Math.round(n||0).toLocaleString('es-AR');
}

async function guardarProducto(codigo) {
  const dolar    = parseFloat(document.getElementById('dolar-valor')?.value) || 0;
  const costoUsd = parseFloat(document.getElementById(`costoUsd-${codigo}`)?.value) || null;
  const impE     = parseFloat(document.getElementById(`envioUsd-${codigo}`)?.value) || null;
  const gan      = parseFloat(document.getElementById(`gan-${codigo}`)?.value) || null;
  const ganM     = parseFloat(document.getElementById(`ganmay-${codigo}`)?.value) || null;
  const stock    = parseInt(document.getElementById(`stock-${codigo}`)?.value) || 0;
  const estado   = document.getElementById(`estado-${codigo}`)?.value || 'activo';
  const nombre   = document.getElementById(`nombre-${codigo}`)?.value.trim();
  const marca    = document.getElementById(`marca-${codigo}`)?.value.trim() || null;
  const categoria = document.getElementById(`categoria-${codigo}`)?.value.trim() || null;
  const descripcion = document.getElementById(`descripcion-${codigo}`)?.value.trim() || null;

  if (!nombre) { toast('El nombre no puede quedar vacío', 'err'); return; }

  const costoTotal    = calcCostoPesos(costoUsd, impE, dolar) || null;
  const precioPublico = calcPrecioDesde(costoTotal, 0, gan) || null;
  const precioMayor   = calcPrecioDesde(costoTotal, 0, ganM) || null;

  const body = {
    nombre: nombre,
    marca: marca,
    categoria: categoria,
    descripcion: descripcion,
    costo_usd: costoUsd,
    imp_e: impE,
    costo_final: costoTotal,
    ganancia: gan,
    ganancia_mayorista: ganM,
    stock: stock,
    estado: estado
  };
  if(precioPublico) body.precio_publico = precioPublico;
  if(precioMayor)   body.precio_mayorista = precioMayor;

  try {
    await fetch(`${SUPA_URL}/rest/v1/productos?codigo=eq.${encodeURIComponent(codigo)}`, {
      method:'PATCH', headers:hdrs, body:JSON.stringify(body)
    });
    const p = todosLosProductos.find(x=>x.codigo===codigo);
    if(p) { p.nombre=nombre; p.marca=marca; p.categoria=categoria; p.descripcion=descripcion; p.costo_usd=costoUsd; p.imp_e=impE; p.costo_final=costoTotal; p.ganancia=gan; p.ganancia_mayorista=ganM; p.stock=stock; p.estado=estado; if(precioPublico) p.precio_publico=precioPublico; if(precioMayor) p.precio_mayorista=precioMayor; }
    const btn = document.getElementById(`btn-${codigo}`);
    if(btn) { btn.textContent='✓ Guardado'; btn.classList.add('guardado'); }
    // Volver a deshabilitar inputs
    [`costoUsd-${codigo}`,`envioUsd-${codigo}`,`gan-${codigo}`,`ganmay-${codigo}`,`stock-${codigo}`,`estado-${codigo}`,`nombre-${codigo}`,`marca-${codigo}`,`categoria-${codigo}`,`descripcion-${codigo}`].forEach(id => {
      const el = document.getElementById(id); if(el) el.disabled = true;
    });
    setTimeout(() => {
      if(btn) { btn.textContent='Editar'; btn.className='btn-editar-row'; btn.onclick = () => editarProducto(codigo); }
    }, 1500);
    toast('Guardado ✓', 'ok');
  } catch(e) { toast('Error al guardar', 'err'); }
}

function sortBy(field) {
  if(sortField === field) sortDir *= -1;
  else { sortField = field; sortDir = 1; }
  filtrarTabla();
}

function filtrarTabla() {
  const q = document.getElementById('buscar').value.toLowerCase();
  const cat = document.getElementById('filtro-cat').value;
  const marca = document.getElementById('filtro-marca').value;
  const stock = document.getElementById('filtro-stock').value;

  let prods = todosLosProductos.filter(p => {
    const matchQ = !q || (p.nombre||'').toLowerCase().includes(q) || (p.codigo||'').toLowerCase().includes(q);
    const matchCat = !cat || p.categoria === cat;
    const matchMarca = !marca || p.marca === marca;
    const matchStock = !stock || (stock==='sin' ? !p.stock||p.stock<=0 : p.stock>0);
    return matchQ && matchCat && matchMarca && matchStock;
  });

  if(sortField) {
    prods.sort((a, b) => {
      const na = parseFloat(a[sortField]);
      const nb = parseFloat(b[sortField]);
      if (!isNaN(na) && !isNaN(nb)) return (na - nb) * sortDir;
      const va = (a[sortField]||'').toString().toLowerCase();
      const vb = (b[sortField]||'').toString().toLowerCase();
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
  }

  renderTabla(prods);
}

function renderTabla(prods) {
  if (!prods.length) {
    document.getElementById('tabla-contenido').innerHTML = '<div class="loading-txt">Sin resultados</div>';
    return;
  }

  const arrowCod  = sortField==='codigo' ? (sortDir===1?'▲':'▼') : '⇅';
  const arrowNom  = sortField==='nombre' ? (sortDir===1?'▲':'▼') : '⇅';
  const arrowStock = sortField==='stock' ? (sortDir===1?'▲':'▼') : '⇅';

  document.getElementById('tabla-contenido').innerHTML = `
    <table>
      <thead><tr>
        <th>Foto</th>
        <th style="cursor:pointer;user-select:none;width:45px;" onclick="sortBy('codigo')">Código <span style="color:var(--violet-light);font-size:0.65rem;">${arrowCod}</span></th>
        <th style="cursor:pointer;user-select:none;" onclick="sortBy('nombre')">Nombre <span style="color:var(--violet-light);font-size:0.65rem;">${arrowNom}</span></th>
        <th>Marca</th>
        <th>Categoría</th>
        <th style="text-align:right;cursor:pointer;user-select:none;" onclick="sortBy('stock')">Stock <span style="color:var(--violet-light);font-size:0.65rem;">${arrowStock}</span></th>
        <th style="text-align:right;color:var(--yellow);">Costo USD</th>
        <th style="text-align:right;color:var(--yellow);">Imp.E %</th>
        <th style="text-align:right;color:var(--yellow);">Costo Total</th>
        <th style="text-align:right;">Gan. Min. %</th>
        <th style="text-align:right;">P. Público</th>
        <th style="text-align:right;">Gan. May. %</th>
        <th style="text-align:right;">P. Mayor.</th>
        <th>Descripción</th>
        <th>Estado</th>
        <th></th>
        <th></th>
      </tr></thead>
      <tbody>
        ${prods.map(p => {
          const dolar = parseFloat(document.getElementById('dolar-valor')?.value) || 1200;
          const costoTotal = calcCostoPesos(p.costo_usd, p.imp_e, dolar);
          const costoBase = costoTotal || parseFloat(p.costo) || 0;
          const precioPublico = calcPrecioDesde(costoBase, 0, p.ganancia);
          const precioMayor = calcPrecioDesde(costoBase, 0, p.ganancia_mayorista);
          return `<tr id="row-${p.codigo}">
            <td>
              <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                <img src="${getImgUrl((p.foto||'').split(',')[0].trim())}" class="img-thumb" style="width:36px;height:36px;object-fit:contain;border-radius:6px;background:var(--surface2);" onerror="this.style.opacity='0.2';this.title='Sin foto o error al cargar'" onclick="abrirModalImg('${getImgUrl((p.foto||'').split(',')[0].trim())}','${p.nombre.replace(/'/g,"\\'")}','${(p.foto||'').replace(/'/g,"\\'")}')">
                <button onclick="abrirModalFotos('${p.codigo}')" style="background:none;border:1px solid var(--border);border-radius:5px;color:var(--text3);font-size:0.62rem;padding:1px 5px;cursor:pointer;">🖼 Fotos</button>
              </div>
            </td>
            <td style="color:var(--text3);font-family:monospace;font-size:0.75rem;">${p.codigo||'-'}</td>
            <td style="min-width:320px;max-width:420px;">
              <textarea class="td-input nombre-auto" id="nombre-${p.codigo}" rows="1" style="width:100%;resize:vertical;font-weight:700;white-space:normal;text-align:left;overflow:hidden;" oninput="marcarSinGuardar('${p.codigo}');autoAltura(this)" disabled>${p.nombre||''}</textarea>
            </td>
            <td><input class="td-input" id="marca-${p.codigo}" type="text" value="${(p.marca||'').replace(/"/g,'&quot;')}" style="width:60px;text-align:left;" oninput="marcarSinGuardar('${p.codigo}')" disabled></td>
            <td><input class="td-input" id="categoria-${p.codigo}" type="text" value="${(p.categoria||'').replace(/"/g,'&quot;')}" style="width:60px;text-align:left;" oninput="marcarSinGuardar('${p.codigo}')" disabled></td>
            <td style="text-align:right;"><input class="td-input" id="stock-${p.codigo}" type="number" min="0" value="${p.stock||0}" style="width:45px;" oninput="marcarSinGuardar('${p.codigo}')" disabled></td>
            <td style="text-align:right;"><input class="td-input" id="costoUsd-${p.codigo}" type="number" min="0" step="0.01" value="${p.costo_usd||''}" placeholder="0" oninput="actualizarCalc('${p.codigo}')" style="border-color:rgba(245,158,11,0.3);" disabled></td>
            <td style="text-align:right;"><input class="td-input" id="envioUsd-${p.codigo}" type="number" min="0" step="0.01" value="${p.imp_e||''}" placeholder="0" oninput="actualizarCalc('${p.codigo}')" style="border-color:rgba(245,158,11,0.3);" disabled></td>
            <td style="text-align:right;"><span style="font-weight:700;color:var(--yellow);" id="costo-pesos-${p.codigo}">${costoTotal ? fmt(costoTotal) : (p.costo ? fmt(p.costo) : '-')}</span></td>
            <td style="text-align:right;"><input class="td-input" id="gan-${p.codigo}" type="number" min="0" value="${p.ganancia||''}" placeholder="0" oninput="actualizarCalc('${p.codigo}')" disabled></td>
            <td style="text-align:right;"><span class="precio-calc" id="calc-pub-${p.codigo}">${precioPublico ? fmt(precioPublico) : (p.precio_publico ? fmt(p.precio_publico) : '-')}</span></td>
            <td style="text-align:right;"><input class="td-input" id="ganmay-${p.codigo}" type="number" min="0" value="${p.ganancia_mayorista||''}" placeholder="0" oninput="actualizarCalc('${p.codigo}')" disabled></td>
            <td style="text-align:right;"><span class="precio-mayo" id="calc-may-${p.codigo}">${precioMayor ? fmt(precioMayor) : (p.precio_mayorista ? fmt(p.precio_mayorista) : '-')}</span></td>
            <td style="min-width:160px;">
              <textarea class="td-input" id="descripcion-${p.codigo}" rows="2" style="width:100%;resize:vertical;white-space:normal;font-size:0.72rem;text-align:left;" placeholder="Sin descripción" oninput="marcarSinGuardar('${p.codigo}')" disabled>${p.descripcion||''}</textarea>
            </td>
            <td>
              <select class="td-input" id="estado-${p.codigo}" style="width:90px;" oninput="marcarSinGuardar('${p.codigo}')" disabled>
                <option value="activo" ${p.estado==='activo'?'selected':''}>Activo</option>
                <option value="oferta" ${p.estado==='oferta'?'selected':''}>Oferta</option>
                <option value="inactivo" ${p.estado==='inactivo'?'selected':''}>Inactivo</option>
              </select>
            </td>
            <td><button class="btn-editar-row" id="btn-${p.codigo}" onclick="editarProducto('${p.codigo}')">Editar</button></td>
            <td><button onclick="eliminarProducto('${p.codigo}')" style="background:none;border:1px solid var(--red);border-radius:6px;color:var(--red);font-size:0.7rem;padding:4px 8px;cursor:pointer;">🗑</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;

  document.querySelectorAll('.nombre-auto').forEach(autoAltura);
}

function toast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = tipo === 'err' ? 'err show' : 'show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 2500);
}

</script>
</body>
</html>
