<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blinky MDQ — Panel</title>
<style>
:root {
  --bg: #0a0a10;
  --surface: #12121a;
  --surface2: #1a1a26;
  --surface3: #222232;
  --border: #2a2a3e;
  --violet: #7c3aed;
  --violet2: #6d28d9;
  --violet-light: #a78bfa;
  --cyan: #06b6d4;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #475569;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

/* LOGIN */
#login-screen { min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,0.15) 0%,transparent 70%); }
.login-card { background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center; }
.login-logo { margin-bottom:1.5rem; }
.login-logo img { height:36px;filter:invert(1); }
.login-title { font-size:1.1rem;font-weight:700;margin-bottom:0.25rem; }
.login-sub { font-size:0.8rem;color:var(--text2);margin-bottom:1.5rem; }
.login-input { width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1rem;padding:0.75rem 1rem;outline:none;margin-bottom:1rem;text-align:center;letter-spacing:3px;font-family:inherit; }
.login-input:focus { border-color:var(--violet); }
.login-btn { width:100%;background:var(--violet);color:white;border:none;border-radius:10px;padding:0.75rem;font-size:0.95rem;font-weight:700;cursor:pointer; }
.login-btn:hover { background:var(--violet2); }
.login-error { color:var(--red);font-size:0.8rem;margin-top:0.75rem;min-height:1.2rem; }

/* APP */
#app { display:none; }
header { background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100; }
.h-logo { display:flex;align-items:center;gap:0.75rem; }
.h-logo img { height:28px;filter:invert(1); }
.h-logo span { font-size:0.75rem;color:var(--text2);font-weight:600; }
.btn-logout { background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:0.35rem 0.8rem;font-size:0.78rem;font-weight:600;cursor:pointer; }
.btn-logout:hover { color:var(--text);border-color:var(--text2); }

/* NAV */
.nav { display:flex;gap:4px;padding:1rem 1.5rem 0;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto; }
.nav-tab { padding:0.5rem 1rem;border-radius:8px 8px 0 0;border:none;background:transparent;color:var(--text2);font-size:0.85rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap; }
.nav-tab.active { color:var(--violet-light);border-bottom-color:var(--violet); }
.nav-tab:hover:not(.active) { color:var(--text); }

.container { max-width:1100px;margin:0 auto;padding:1.5rem; }
.panel { display:none; }
.panel.active { display:block; }

/* STATS */
.stats-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem; }
.stat-card { background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem; }
.stat-label { font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);margin-bottom:0.5rem; }
.stat-val { font-size:1.6rem;font-weight:900;color:var(--text);letter-spacing:-1px; }
.stat-sub { font-size:0.75rem;color:var(--text3);margin-top:0.25rem; }
.stat-card.violet { border-color:rgba(124,58,237,0.3); } .stat-card.violet .stat-val { color:var(--violet-light); }
.stat-card.green { border-color:rgba(16,185,129,0.3); } .stat-card.green .stat-val { color:var(--green); }
.stat-card.cyan { border-color:rgba(6,182,212,0.3); } .stat-card.cyan .stat-val { color:var(--cyan); }
.stat-card.yellow { border-color:rgba(245,158,11,0.3); } .stat-card.yellow .stat-val { color:var(--yellow); }
.stat-card.red { border-color:rgba(239,68,68,0.3); } .stat-card.red .stat-val { color:var(--red); }

.chart-row { display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem; }
@media(max-width:640px){ .chart-row { grid-template-columns:1fr; } }
.chart-card { background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem; }
.chart-title { font-size:0.8rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:1rem; }
.bar-item { margin-bottom:0.6rem; }
.bar-label { font-size:0.78rem;color:var(--text2);margin-bottom:3px;display:flex;justify-content:space-between; }
.bar-track { height:8px;background:var(--surface3);border-radius:4px;overflow:hidden; }
.bar-fill { height:100%;border-radius:4px;background:linear-gradient(90deg,var(--violet),var(--violet-light));transition:width 0.6s ease; }
.donut-wrap { display:flex;align-items:center;gap:1.5rem; }
.donut-legend { display:flex;flex-direction:column;gap:0.5rem; }
.legend-item { display:flex;align-items:center;gap:0.5rem;font-size:0.8rem; }
.legend-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0; }

/* CAJAS */
.cajas-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem; }
.caja-card { background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem; }
.caja-icon { font-size:1.5rem;margin-bottom:0.5rem; }
.caja-label { font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);margin-bottom:0.4rem; }
.caja-val { font-size:1.8rem;font-weight:900;letter-spacing:-1px; }
.caja-sub { font-size:0.75rem;margin-top:0.3rem;opacity:0.65; }
.caja-efectivo { border-color:rgba(16,185,129,0.3); } .caja-efectivo .caja-val { color:var(--green); }
.caja-transferencia { border-color:rgba(6,182,212,0.3); } .caja-transferencia .caja-val { color:var(--cyan); }
.caja-tarjeta { border-color:rgba(124,58,237,0.3); } .caja-tarjeta .caja-val { color:var(--violet-light); }
.caja-val.negativo { color:var(--red) !important; }

/* FORM GASTOS */
.gasto-form-card { background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1.5rem; }
.gasto-form-title { font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);margin-bottom:0.75rem; }
.gasto-form-grid { display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.5rem; }
@media(max-width:500px){ .gasto-form-grid { grid-template-columns:1fr; } }
.gasto-input, .gasto-select { background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.875rem;padding:0.6rem 0.85rem;outline:none;width:100%;font-family:inherit; }
.gasto-input:focus, .gasto-select:focus { border-color:var(--violet); }
.gasto-input.error, .gasto-select.error { border-color:var(--red); }
.btn-gasto-guardar { width:100%;background:var(--green);color:white;border:none;border-radius:9px;padding:0.65rem;font-size:0.875rem;font-weight:700;cursor:pointer;margin-top:0.25rem; }
.btn-gasto-guardar:hover { background:#059669; }

.fecha-filters { display:flex;gap:0.5rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap; }
.fecha-filters label { font-size:0.78rem;color:var(--text2);font-weight:600; }

/* PEDIDOS */
.filters { display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center; }
.filter-select, .filter-input { background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.825rem;padding:0.45rem 0.75rem;outline:none;font-family:inherit; }
.filter-select:focus, .filter-input:focus { border-color:var(--violet); }
.filter-select option { background:var(--surface2); }
.btn-refresh { margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--violet-light);border-radius:8px;padding:0.45rem 0.9rem;font-size:0.8rem;font-weight:700;cursor:pointer; }
.btn-refresh:hover { background:var(--surface2); }

/* PEDIDO CARD con color de fondo según pago */
.pedido-card { border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:0.65rem;cursor:pointer;transition:border-color 0.15s;position:relative;overflow:hidden; }
.pedido-card::before { content:'';position:absolute;inset:0;opacity:0.07;pointer-events:none; }
.pedido-card.pagado::before { background:var(--green); }
.pedido-card.debe::before { background:var(--red); }
.pedido-card:hover { border-color:var(--violet); }
.pedido-card.eliminado { opacity:0.75; }
.pedido-top { display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;position:relative; }
.pedido-num { font-size:0.95rem;font-weight:900;color:var(--violet-light); }
.pedido-nombre { font-size:0.875rem;font-weight:600;margin-left:0.75rem; }
.pedido-fecha { font-size:0.75rem;color:var(--text3); }
.pedido-total { font-size:0.95rem;font-weight:900; }
.pedido-meta { display:flex;gap:0.4rem;margin-top:0.5rem;flex-wrap:wrap;position:relative; }
.pago-status { font-size:0.75rem;font-weight:700;margin-left:auto; }
.pago-status.pagado { color:var(--green); }
.pago-status.debe { color:var(--red); }

.badge { font-size:0.68rem;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.3px; }
.badge-min { background:rgba(6,182,212,0.12);color:var(--cyan); }
.badge-may { background:rgba(245,158,11,0.12);color:var(--yellow); }
.badge-pendiente { background:rgba(245,158,11,0.12);color:var(--yellow); }
.badge-confirmado { background:rgba(99,102,241,0.12);color:#818cf8; }
.badge-en_camino { background:rgba(6,182,212,0.12);color:var(--cyan); }
.badge-entregado { background:rgba(16,185,129,0.12);color:var(--green); }
.badge-cancelado { background:rgba(239,68,68,0.12);color:var(--red); }
.badge-eliminado { background:rgba(239,68,68,0.12);color:var(--red); }
.badge-neutral { background:rgba(148,163,184,0.1);color:var(--text2); }

/* MODAL */
.overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:1rem; }
.overlay.open { display:flex; }
.modal { background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:1.5rem; }
.modal-hdr { display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem; }
.modal-hdr h2 { font-size:1rem;font-weight:900; }
.btn-close { width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:0.9rem;cursor:pointer; }
.detail-row { display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.85rem; }
.detail-row:last-of-type { border-bottom:none; }
.detail-key { color:var(--text2);font-weight:600; }
.items-table { width:100%;border-collapse:collapse;margin-top:1rem;font-size:0.82rem; }
.items-table th { padding:6px 8px;color:var(--text3);font-size:0.7rem;text-transform:uppercase;border-bottom:1px solid var(--border);text-align:left; }
.items-table th:not(:first-child) { text-align:right; }
.items-table td { padding:7px 8px;border-bottom:1px solid var(--border); }
.items-table td:not(:first-child) { text-align:right; }
.items-table tr:last-child td { border-bottom:none; }
.total-row { display:flex;justify-content:flex-end;align-items:center;gap:1rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border); }
.total-lbl { font-size:0.85rem;color:var(--text2);font-weight:600; }
.total-big { font-size:1.4rem;font-weight:900;color:var(--violet-light); }

/* SALDO */
.saldo-box { margin-top:1rem;border-radius:12px;padding:1rem 1.25rem;border:1px solid; }
.saldo-box.pagado { background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.3); }
.saldo-box.debe { background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.3); }
.saldo-title { font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.5rem; }
.saldo-box.pagado .saldo-title { color:var(--green); }
.saldo-box.debe .saldo-title { color:var(--red); }
.saldo-val { font-size:1.3rem;font-weight:900; }
.saldo-box.pagado .saldo-val { color:var(--green); }
.saldo-box.debe .saldo-val { color:var(--red); }

/* FORM PAGO */
.pago-form { margin-top:1rem;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem; }
.pago-form-title { font-size:0.78rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.75rem; }
.pago-form-row { display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.5rem; }
.pago-input { background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem;padding:0.6rem 0.85rem;outline:none;width:100%;font-family:inherit; }
.pago-input:focus { border-color:var(--violet); }
.pago-select { background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.875rem;padding:0.6rem 0.85rem;outline:none;width:100%;font-family:inherit; }
.pago-select:focus { border-color:var(--violet); }
.btn-agregar-pago { width:100%;background:var(--violet);color:white;border:none;border-radius:9px;padding:0.65rem;font-size:0.875rem;font-weight:700;cursor:pointer;margin-top:0.5rem; }
.btn-agregar-pago:hover { background:var(--violet2); }

/* HISTORIAL PAGOS */
.pagos-list { margin-top:0.75rem; }
.pago-item { display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.82rem; }
.pago-item:last-child { border-bottom:none; }
.pago-forma { font-weight:600; }
.pago-forma.efectivo { color:var(--green); }
.pago-forma.transferencia { color:var(--cyan); }
.pago-forma.tarjeta { color:var(--violet-light); }
.pago-monto { font-weight:900; }
.pago-fecha { font-size:0.72rem;color:var(--text3); }

.estado-field { margin-top:1rem; }
.estado-field label { font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);display:block;margin-bottom:0.4rem; }
.estado-field select { width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.875rem;padding:0.6rem 0.85rem;outline:none;font-family:inherit; }

.btn-eliminar { margin-top:1rem;width:100%;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:9px;padding:0.6rem;font-size:0.85rem;font-weight:700;cursor:pointer; }
.btn-eliminar:hover { background:rgba(239,68,68,0.1); }
.btn-restaurar { margin-top:1rem;width:100%;background:transparent;border:1px solid var(--green);color:var(--green);border-radius:9px;padding:0.6rem;font-size:0.85rem;font-weight:700;cursor:pointer; }
.btn-restaurar:hover { background:rgba(16,185,129,0.1); }
/* Botón eliminar en card de lista */
.btn-trash-card { background:transparent;border:none;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:5px;font-size:0.85rem;transition:color 0.15s;flex-shrink:0; }
.btn-trash-card:hover { color:var(--red); }
/* Botón eliminar ítem de tabla */
.btn-del-item { background:transparent;border:none;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:5px;font-size:0.8rem;transition:color 0.15s,background 0.15s; }
.btn-del-item:hover { color:var(--red);background:rgba(239,68,68,0.12); }
/* Botones post-pago */
.post-pago-btns { display:grid;grid-template-columns:1fr auto;gap:0.5rem;margin-top:0.75rem;align-items:center; }
.btn-finalizar { background:var(--green);color:white;border:none;border-radius:9px;padding:0.65rem 1rem;font-size:0.875rem;font-weight:700;cursor:pointer; }
.btn-finalizar:hover { background:#059669; }
.btn-eliminar-chico { background:transparent;border:1px solid var(--red);color:var(--red);border-radius:9px;padding:0.65rem 1rem;font-size:0.78rem;font-weight:700;cursor:pointer;white-space:nowrap; }
.btn-eliminar-chico:hover { background:rgba(239,68,68,0.1); }
/* Botón eliminar en header del modal */
.btn-del-header { background:transparent;border:1px solid rgba(239,68,68,0.4);color:var(--red);border-radius:8px;padding:0.3rem 0.7rem;font-size:0.75rem;font-weight:700;cursor:pointer;margin-right:0.5rem; }
.btn-del-header:hover { background:rgba(239,68,68,0.1);border-color:var(--red); }

.confirm-box { background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:1rem;margin-top:1rem;text-align:center; }
.confirm-box p { font-size:0.85rem;color:var(--text2);margin-bottom:0.75rem; }
.confirm-btns { display:flex;gap:0.5rem;justify-content:center; }
.btn-confirm-si { background:var(--red);color:white;border:none;border-radius:8px;padding:0.5rem 1.2rem;font-size:0.825rem;font-weight:700;cursor:pointer; }
.btn-confirm-no { background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:0.5rem 1.2rem;font-size:0.825rem;font-weight:700;cursor:pointer; }

.empty { text-align:center;padding:3rem 1rem;color:var(--text3); }
.empty-icon { font-size:2rem;margin-bottom:0.75rem; }
.loading-txt { text-align:center;padding:2rem;color:var(--text3);font-size:0.875rem; }
#toast { position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.65rem 1.1rem;font-size:0.825rem;font-weight:600;z-index:999;transform:translateY(80px);opacity:0;transition:all 0.3s;max-width:260px; }
#toast.show { transform:translateY(0);opacity:1; }
#toast.ok { border-color:var(--green);color:var(--green); }
#toast.err { border-color:var(--red);color:var(--red); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><img src="https://raw.githubusercontent.com/blinkymdq/blinkymdq/main/blinkysinfondo.png" alt="Blinky MDQ"></div>
    <div class="login-title">Panel de gestión</div>
    <div class="login-sub">Ingresá tu contraseña para continuar</div>
    <input class="login-input" type="password" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="h-logo">
      <img src="https://raw.githubusercontent.com/blinkymdq/blinkymdq/main/blinkysinfondo.png" alt="Blinky">
      <span>Panel de gestión</span>
    </div>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </header>

  <div class="nav">
    <button class="nav-tab active" onclick="switchTab('stats',this)">Estadísticas</button>
    <button class="nav-tab" onclick="switchTab('cajas',this)">Cajas</button>
    <button class="nav-tab" onclick="switchTab('gastos',this)">Cargar gasto</button>
    <button class="nav-tab" onclick="switchTab('pedidos',this)">Pedidos</button>
    <button class="nav-tab" onclick="switchTab('eliminados',this)">Eliminados</button>
  </div>

  <div class="container">

    <!-- STATS -->
    <div id="panel-stats" class="panel active">
      <div class="stats-grid" id="stats-cards"><div class="loading-txt">Cargando...</div></div>
      <div class="chart-row">
        <div class="chart-card">
          <div class="chart-title">Productos más vendidos</div>
          <div id="chart-productos"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Minorista vs Mayorista</div>
          <div class="donut-wrap">
            <canvas id="donut-canvas" width="120" height="120"></canvas>
            <div class="donut-legend" id="donut-legend"></div>
          </div>
        </div>
      </div>
      <div class="chart-card" style="margin-bottom:1rem;">
        <div class="chart-title">Ventas por día (últimos 14 días)</div>
        <div id="chart-dias"></div>
      </div>
    </div>

    <!-- CAJAS -->
    <div id="panel-cajas" class="panel">
      <div class="fecha-filters">
        <label>Desde</label>

async function cargarStats() {
  try {
    const [pR,iR] = await Promise.all([
      fetch(`${SUPA_URL}/rest/v1/pedidos?select=*&order=created_at.desc`,{headers:hdrs}),
      fetch(`${SUPA_URL}/rest/v1/pedido_items?select=*`,{headers:hdrs})
    ]);
    const pedidos = await pR.json();
    const items = await iR.json();
    if(!Array.isArray(pedidos)) return;

    const hoy=new Date(); hoy.setHours(0,0,0,0);
    const semana=new Date(hoy); semana.setDate(hoy.getDate()-7);
    const mes=new Date(hoy); mes.setDate(1);

    const pedidosHoy=pedidos.filter(p=>new Date(p.created_at)>=hoy);
    const pedidosSem=pedidos.filter(p=>new Date(p.created_at)>=semana);
    const pedidosMes=pedidos.filter(p=>new Date(p.created_at)>=mes);
    const pendientes=pedidos.filter(p=>p.estado==='pendiente').length;
    const conSaldo=pedidos.filter(p=>Number(p.monto_pagado||0)<Number(p.total)).length;

    document.getElementById('stats-cards').innerHTML=`
      <div class="stat-card violet"><div class="stat-label">Ventas hoy</div><div class="stat-val">$${pedidosHoy.reduce((s,p)=>s+Number(p.total),0).toLocaleString('es-AR')}</div><div class="stat-sub">${pedidosHoy.length} pedidos</div></div>
      <div class="stat-card green"><div class="stat-label">Esta semana</div><div class="stat-val">$${pedidosSem.reduce((s,p)=>s+Number(p.total),0).toLocaleString('es-AR')}</div><div class="stat-sub">${pedidosSem.length} pedidos</div></div>
      <div class="stat-card cyan"><div class="stat-label">Este mes</div><div class="stat-val">$${pedidosMes.reduce((s,p)=>s+Number(p.total),0).toLocaleString('es-AR')}</div><div class="stat-sub">${pedidosMes.length} pedidos</div></div>
      <div class="stat-card yellow"><div class="stat-label">Pendientes</div><div class="stat-val">${pendientes}</div><div class="stat-sub">sin confirmar</div></div>
      <div class="stat-card red"><div class="stat-label">Con saldo</div><div class="stat-val">${conSaldo}</div><div class="stat-sub">pagos incompletos</div></div>
    `;

    const conteo={};
    items.forEach(i=>{conteo[i.producto]=(conteo[i.producto]||0)+i.cantidad;});
    const top=Object.entries(conteo).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const maxQ=top[0]?top[0][1]:1;
    document.getElementById('chart-productos').innerHTML=top.length?top.map(([n,q])=>`
      <div class="bar-item">
        <div class="bar-label"><span style="max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.75rem;">${n}</span><span style="font-weight:700;color:var(--text);">${q}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(q/maxQ*100)}%"></div></div>
      </div>`).join(''):'<div style="color:var(--text3);font-size:0.8rem;">Sin datos</div>';

    const nMino=pedidos.filter(p=>p.tipo==='minorista').length;
    const nMayo=pedidos.filter(p=>p.tipo==='mayorista').length;
    const total=nMino+nMayo||1;
    dibujarDonut(nMino/total,nMayo/total);
    document.getElementById('donut-legend').innerHTML=`
      <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div><span>Minorista <strong>${nMino}</strong></span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div><span>Mayorista <strong>${nMayo}</strong></span></div>`;

    const dias={};
    for(let i=13;i>=0;i--){const d=new Date(hoy);d.setDate(hoy.getDate()-i);dias[d.toISOString().slice(0,10)]=0;}
    pedidos.forEach(p=>{const k=p.created_at.slice(0,10);if(dias[k]!==undefined)dias[k]+=Number(p.total);});
    const maxV=Math.max(...Object.values(dias))||1;
    document.getElementById('chart-dias').innerHTML=`
      <div style="display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:0.5rem;">
        ${Object.entries(dias).map(([fecha,val])=>{
          const pct=Math.round(val/maxV*100);
          const d=new Date(fecha+'T12:00:00');
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
            <div title="$${val.toLocaleString('es-AR')}" style="width:100%;background:${pct>0?'linear-gradient(to top,#7c3aed,#a78bfa)':'var(--surface3)'};border-radius:4px 4px 0 0;height:${Math.max(pct,2)}%;min-height:${pct>0?'4px':'2px'};"></div>
            <div style="font-size:0.6rem;color:var(--text3);">${d.getDate()}/${d.getMonth()+1}</div>
          </div>`;
        }).join('')}
      </div>`;
  } catch(e){console.error(e);}
}

function dibujarDonut(pMino,pMayo) {
  const canvas=document.getElementById('donut-canvas');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,120,120);
  let angle=-Math.PI/2;
  [{pct:pMino,color:'#06b6d4'},{pct:pMayo,color:'#f59e0b'}].forEach(s=>{
    if(!s.pct)return;
    const end=angle+s.pct*2*Math.PI;
    ctx.beginPath();ctx.moveTo(60,60);ctx.arc(60,60,50,angle,end);ctx.closePath();
    ctx.fillStyle=s.color;ctx.fill();angle=end;
  });
  ctx.beginPath();ctx.arc(60,60,30,0,2*Math.PI);ctx.fillStyle='#12121a';ctx.fill();
}

async function guardarGasto() {
  const fecha=document.getElementById('g-fecha').value;
  const proveedor=document.getElementById('g-proveedor').value.trim();
  const descripcion=document.getElementById('g-descripcion').value.trim();
  const monto=parseFloat(document.getElementById('g-monto').value);
  const forma=document.getElementById('g-forma').value;

  // Validar campos
  let ok=true;
  const validaciones={
    'g-fecha': fecha,
    'g-proveedor': proveedor,
    'g-descripcion': descripcion,
    'g-monto': document.getElementById('g-monto').value && monto > 0,
    'g-forma': forma
  };
  Object.entries(validaciones).forEach(([id, val])=>{
    const el=document.getElementById(id);
    el.classList.toggle('error', !val);
    if(!val) ok=false;
  });
  if(!ok){toast('Completá todos los campos','err');return;}

  try {
    await fetch(`${SUPA_URL}/rest/v1/gastos`,{
      method:'POST', headers:hdrs,
      body:JSON.stringify({fecha,proveedor,descripcion,monto,forma_pago:forma})
    });
    toast('Gasto registrado ✓','ok');
    ['g-fecha','g-proveedor','g-descripcion','g-monto','g-forma'].forEach(id=>{
      const el=document.getElementById(id);
      el.value=''; el.classList.remove('error');
    });
    // Ir a Cajas para ver el resultado
    const tabCajas=document.querySelector('.nav-tab:nth-child(2)');
    switchTab('cajas', tabCajas);
    cargarCajas();
  } catch(e){toast('Error al guardar gasto','err');}
}

async function eliminarGasto(id) {
  if(!confirm('¿Eliminar este gasto?')) return;
  try {
    await fetch(`${SUPA_URL}/rest/v1/gastos?id=eq.${id}`,{method:'DELETE',headers:hdrs});
    toast('Gasto eliminado','ok');
    cargarCajas();
  } catch(e){toast('Error al eliminar gasto','err');}
}

  const tipo=document.getElementById('filtro-tipo').value;
  const filtroPago=document.getElementById('filtro-pago').value;
  const busca=document.getElementById('filtro-busca').value.trim().toLowerCase();
  let url=`${SUPA_URL}/rest/v1/pedidos?order=created_at.desc`;
  if(estado) url+=`&estado=eq.${estado}`;
  if(tipo) url+=`&tipo=eq.${tipo}`;
  try {
    let pedidos=await(await fetch(url,{headers:hdrs})).json();
    if(!Array.isArray(pedidos)){cont.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>Error</p></div>';return;}
    if(busca) pedidos=pedidos.filter(p=>p.nombre.toLowerCase().includes(busca));
    if(filtroPago==='pagado') pedidos=pedidos.filter(p=>Number(p.monto_pagado||0)>=Number(p.total));
    if(filtroPago==='debe') pedidos=pedidos.filter(p=>Number(p.monto_pagado||0)<Number(p.total));
    if(!pedidos.length){cont.innerHTML='<div class="empty"><div class="empty-icon">📦</div><p>No hay pedidos</p></div>';return;}

    cont.innerHTML=pedidos.map(p=>{
      const pagado=Number(p.monto_pagado||0);
      const total=Number(p.total);
      const saldo=total-pagado;
      const esPagado=saldo<=0;
      return `<div class="pedido-card ${esPagado?'pagado':'debe'}" onclick="verPedido('${p.numero_pedido}',false)">
        <div class="pedido-top">
          <div>
            <span class="pedido-num">${p.numero_pedido}</span>
            <span class="pedido-nombre">${p.nombre}</span>
            ${p.telefono?`<a href="https://wa.me/549${p.telefono}" target="_blank" onclick="event.stopPropagation()" style="margin-left:0.5rem;font-size:0.75rem;color:#10b981;">📱</a>`:''}
          </div>
          <div style="text-align:right;">
            <div class="pedido-total">$${total.toLocaleString('es-AR')}</div>
            <div class="pedido-fecha">${new Date(p.created_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
          </div>
        </div>
        <div class="pedido-meta">
          <span class="badge badge-${p.tipo==='mayorista'?'may':'min'}">${p.tipo}</span>
          <span class="badge badge-${p.estado}">${estadoLabel(p.estado)}</span>
          <span class="badge badge-neutral">${p.forma_pago}</span>
          <span class="badge badge-neutral">${p.entrega==='envio'?'🚚 Envío':'🏪 Retiro'}</span>
          <span class="pago-status ${esPagado?'pagado':'debe'}" style="margin-left:auto;">
            ${esPagado?'✓ PAGADO':'Debe $'+saldo.toLocaleString('es-AR')}
          </span>
          <button class="btn-trash-card" title="Eliminar pedido" onclick="event.stopPropagation();eliminarPedidoDirecto('${p.numero_pedido}')">🗑</button>
        </div>
      </div>`;
    }).join('');
  } catch(e){cont.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>Error</p></div>';}
}

async function cargarEliminados() {
  const cont=document.getElementById('lista-eliminados');
  cont.innerHTML='<div class="loading-txt">Cargando...</div>';
  try {
    const pedidos=await(await fetch(`${SUPA_URL}/rest/v1/pedidos_eliminados?order=eliminado_at.desc`,{headers:hdrs})).json();
    if(!Array.isArray(pedidos)||!pedidos.length){cont.innerHTML='<div class="empty"><div class="empty-icon">🗑️</div><p>No hay pedidos eliminados</p></div>';return;}
    cont.innerHTML=pedidos.map(p=>`
      <div class="pedido-card eliminado" onclick="verPedido('${p.numero_pedido}',true)">
        <div class="pedido-top">
          <div><span class="pedido-num">${p.numero_pedido}</span><span class="pedido-nombre">${p.nombre}</span></div>
          <div style="text-align:right;">
            <div class="pedido-total">$${Number(p.total).toLocaleString('es-AR')}</div>
            <div class="pedido-fecha">Eliminado: ${new Date(p.eliminado_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
          </div>
        </div>
        <div class="pedido-meta">
          <span class="badge badge-eliminado">Eliminado</span>
          <span class="badge badge-${p.tipo==='mayorista'?'may':'min'}">${p.tipo}</span>
          <span class="badge badge-neutral">${p.forma_pago}</span>
        </div>
      </div>`).join('');
  } catch(e){cont.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>Error</p></div>';}
}

function estadoLabel(e){return{pendiente:'Pendiente',confirmado:'Confirmado',en_camino:'En camino',entregado:'Entregado',cancelado:'Cancelado'}[e]||e;}

// ── VER PEDIDO ─────────────────────────────────
async function verPedido(num, esEliminado) {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal-title').textContent='Pedido '+num;
  document.getElementById('modal-body').innerHTML='<div class="loading-txt">Cargando...</div>';
  try {
    const tabla=esEliminado?'pedidos_eliminados':'pedidos';
    const [pR,iR,pgR]=await Promise.all([
      fetch(`${SUPA_URL}/rest/v1/${tabla}?numero_pedido=eq.${encodeURIComponent(num)}`,{headers:hdrs}),
      fetch(`${SUPA_URL}/rest/v1/pedido_items?numero_pedido=eq.${encodeURIComponent(num)}`,{headers:hdrs}),
      esEliminado?Promise.resolve({json:()=>[]}):fetch(`${SUPA_URL}/rest/v1/pagos?numero_pedido=eq.${encodeURIComponent(num)}&order=created_at.asc`,{headers:hdrs})
    ]);
    const [ps,items,pagos]=await Promise.all([pR.json(),iR.json(),pgR.json()]);
    const p=ps[0];
    const montoPagado=Number(p.monto_pagado||0);
    const total=Number(p.total);
    const saldo=total-montoPagado;
    const esPagado=saldo<=0;

    document.getElementById('modal-body').innerHTML=`
      <div class="detail-row"><span class="detail-key">Cliente</span><span>${p.nombre}</span></div>
      ${p.telefono?`<div class="detail-row"><span class="detail-key">Teléfono</span><a href="https://wa.me/549${p.telefono}" target="_blank" style="color:var(--green);">📱 ${p.telefono}</a></div>`:''}
      <div class="detail-row"><span class="detail-key">Tipo</span><span class="badge badge-${p.tipo==='mayorista'?'may':'min'}">${p.tipo}</span></div>
      <div class="detail-row"><span class="detail-key">Pago</span><span>${p.forma_pago}</span></div>
      <div class="detail-row"><span class="detail-key">Entrega</span><span>${p.entrega==='envio'?'🚚 Envío':'🏪 Retiro'}</span></div>
      ${p.notas?`<div class="detail-row"><span class="detail-key">Notas</span><span>${p.notas}</span></div>`:''}
      <div class="detail-row"><span class="detail-key">Fecha</span><span>${new Date(p.created_at).toLocaleString('es-AR')}</span></div>
      ${esEliminado?`<div class="detail-row"><span class="detail-key">Eliminado</span><span style="color:var(--red);">${new Date(p.eliminado_at).toLocaleString('es-AR')}</span></div>`:''}

      <table class="items-table">
        <thead><tr><th>Producto</th><th style="text-align:right;">Cant.</th><th style="text-align:right;">P. Unit.</th><th style="text-align:right;">Subtotal</th>${!esEliminado?'<th style="width:30px;"></th>':''}</tr></thead>
        <tbody>${items.map(i=>`<tr>
          <td>${i.producto}</td>
          <td style="text-align:right;">${i.cantidad}</td>
          <td style="text-align:right;">$${Number(i.precio_unitario).toLocaleString('es-AR')}</td>
          <td style="text-align:right;font-weight:700;">$${Number(i.subtotal).toLocaleString('es-AR')}</td>
          ${!esEliminado?`<td style="text-align:right;"><button class="btn-del-item" title="Quitar producto" onclick="eliminarItem(${i.id},'${num}')">✕</button></td>`:''}
        </tr>`).join('')}</tbody>
      </table>

      <div class="total-row">
        <span class="total-lbl">Total</span>
        <span class="total-big">$${total.toLocaleString('es-AR')}</span>
      </div>

      ${!esEliminado?`
        <!-- SALDO -->
        <div class="saldo-box ${esPagado?'pagado':'debe'}">
          <div class="saldo-title">${esPagado?'✓ PAGADO':'Saldo pendiente'}</div>
          <div class="saldo-val">${esPagado?'$0':'$'+saldo.toLocaleString('es-AR')}</div>
          ${montoPagado>0?`<div style="font-size:0.78rem;margin-top:4px;opacity:0.7;">Pagado: $${montoPagado.toLocaleString('es-AR')}</div>`:''}
        </div>

        <!-- HISTORIAL PAGOS -->
        ${pagos.length?`
          <div style="margin-top:1rem;">
            <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);margin-bottom:0.5rem;">Historial de pagos</div>
            <div class="pagos-list">
              ${pagos.map(pg=>`<div class="pago-item">
                <span class="pago-forma ${pg.forma_pago}">${pg.forma_pago}</span>
                <span class="pago-monto">$${Number(pg.monto).toLocaleString('es-AR')}</span>
                <span class="pago-fecha">${new Date(pg.created_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
              </div>`).join('')}
            </div>
          </div>`:''}

        <!-- FORM AGREGAR PAGO -->
        ${!esPagado?`
          <div class="pago-form">
            <div class="pago-form-title">Agregar pago</div>
            <div class="pago-form-row">
              <input type="number" class="pago-input" id="pago-monto" placeholder="$0" min="0">
              <select class="pago-select" id="pago-forma">
                <option value="efectivo">💵 Efectivo</option>
                <option value="transferencia">📲 Transferencia</option>
                <option value="tarjeta">💳 Tarjeta</option>
              </select>
            </div>
            <button class="btn-agregar-pago" onclick="agregarPago('${num}', ${total})">Agregar pago</button>
            <div class="post-pago-btns">
              <button class="btn-finalizar" onclick="finalizarPedido('${num}')">✓ Finalizar pedido</button>
              <button class="btn-eliminar-chico" onclick="mostrarConfirmEliminar()">🗑️ Eliminar</button>
            </div>
          </div>`:`
          <div class="post-pago-btns" style="margin-top:1rem;">
            <button class="btn-finalizar" onclick="finalizarPedido('${num}')">✓ Finalizar pedido</button>
            <button class="btn-eliminar-chico" onclick="mostrarConfirmEliminar()">🗑️ Eliminar</button>
          </div>`}

        <div class="estado-field">
          <label>Estado del pedido</label>
          <select onchange="cambiarEstado('${num}',this.value)">
            <option value="pendiente" ${p.estado==='pendiente'?'selected':''}>Pendiente</option>
            <option value="confirmado" ${p.estado==='confirmado'?'selected':''}>Confirmado</option>
            <option value="en_camino" ${p.estado==='en_camino'?'selected':''}>En camino</option>
            <option value="entregado" ${p.estado==='entregado'?'selected':''}>Entregado</option>
            <option value="cancelado" ${p.estado==='cancelado'?'selected':''}>Cancelado</option>
          </select>
        </div>
        <div id="confirm-box" style="display:none;" class="confirm-box">
          <p>¿Seguro que querés eliminar el pedido <strong>${num}</strong>?</p>
          <div class="confirm-btns">
            <button class="btn-confirm-si" onclick="eliminarPedido('${num}')">Sí, eliminar</button>
            <button class="btn-confirm-no" onclick="document.getElementById('confirm-box').style.display='none'">Cancelar</button>
          </div>
        </div>
      `:`<button class="btn-restaurar" onclick="restaurarPedido('${num}')">↩ Restaurar pedido</button>`}
    `;
  } catch(e){document.getElementById('modal-body').innerHTML='<p style="color:var(--red);padding:1rem;">Error al cargar.</p>';}
}

async function agregarPago(num, totalPedido) {
  const monto=parseFloat(document.getElementById('pago-monto').value);
  const forma=document.getElementById('pago-forma').value;
  if(!monto||monto<=0){toast('Ingresá un monto válido','err');return;}

  try {
    // Insertar pago
    await fetch(`${SUPA_URL}/rest/v1/pagos`,{method:'POST',headers:hdrs,body:JSON.stringify({numero_pedido:num,monto,forma_pago:forma})});

    // Actualizar monto_pagado en pedido
    const pR=await fetch(`${SUPA_URL}/rest/v1/pedidos?numero_pedido=eq.${encodeURIComponent(num)}`,{headers:hdrs});
    const ps=await pR.json();
    const actual=Number(ps[0].monto_pagado||0);
    const nuevo=Math.min(actual+monto, totalPedido);

    await fetch(`${SUPA_URL}/rest/v1/pedidos?numero_pedido=eq.${encodeURIComponent(num)}`,{
      method:'PATCH',headers:hdrs,body:JSON.stringify({monto_pagado:nuevo})
    });

    toast('Pago registrado ✓','ok');
    verPedido(num,false);
    cargarPedidos();
    cargarCajas();
  } catch(e){toast('Error al registrar pago','err');}
}

async function cambiarEstado(num,estado) {
  try {
    await fetch(`${SUPA_URL}/rest/v1/pedidos?numero_pedido=eq.${encodeURIComponent(num)}`,{method:'PATCH',headers:hdrs,body:JSON.stringify({estado})});
    toast('Estado actualizado ✓','ok');
  } catch{toast('Error al actualizar','err');}
}

async function eliminarPedidoDirecto(num) {
  if(!confirm(`¿Seguro que querés eliminar el pedido ${num}?`)) return;
  try {
    const pR=await fetch(`${SUPA_URL}/rest/v1/pedidos?numero_pedido=eq.${encodeURIComponent(num)}`,{headers:hdrs});
    const ps=await pR.json(); const p={...ps[0]}; delete p.id;
    await fetch(`${SUPA_URL}/rest/v1/pedidos_eliminados`,{method:'POST',headers:hdrs,body:JSON.stringify({...p,eliminado_at:new Date().toISOString()})});
    await fetch(`${SUPA_URL}/rest/v1/pedidos?numero_pedido=eq.${encodeURIComponent(num)}`,{method:'DELETE',headers:hdrs});
    toast('Pedido eliminado','ok'); cargarPedidos(); cargarStats();
  } catch(e){toast('Error al eliminar','err');}
}

function mostrarConfirmEliminar(){
  const box=document.getElementById('confirm-box');
  if(box) { box.style.display='block'; box.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

function confirmarEliminar(num){mostrarConfirmEliminar();}

async function eliminarItem(itemId, numPedido) {
  if(!confirm('¿Quitar este producto del pedido?')) return;
  try {
    // Obtener el ítem para saber su subtotal
    const iR = await fetch(`${SUPA_URL}/rest/v1/pedido_items?id=eq.${itemId}`,{headers:hdrs});
    const items = await iR.json();
    if(!items.length){toast('Ítem no encontrado','err');return;}
    const subtotal = Number(items[0].subtotal);

    // Eliminar el ítem
    await fetch(`${SUPA_URL}/rest/v1/pedido_items?id=eq.${itemId}`,{method:'DELETE',headers:hdrs});

    // Actualizar el total del pedido
    const pR = await fetch(`${SUPA_URL}/rest/v1/pedidos?numero_pedido=eq.${encodeURIComponent(numPedido)}`,{headers:hdrs});
    const ps = await pR.json();
    const nuevoTotal = Math.max(0, Number(ps[0].total) - subtotal);
    await fetch(`${SUPA_URL}/rest/v1/pedidos?numero_pedido=eq.${encodeURIComponent(numPedido)}`,{
      method:'PATCH', headers:hdrs, body:JSON.stringify({total:nuevoTotal})
    });

    toast('Producto quitado ✓','ok');
    verPedido(numPedido, false);
    cargarPedidos();
  } catch(e){toast('Error al quitar producto','err');}
}

async function finalizarPedido(num) {
  try {
    await fetch(`${SUPA_URL}/rest/v1/pedidos?numero_pedido=eq.${encodeURIComponent(num)}`,{
      method:'PATCH', headers:hdrs, body:JSON.stringify({estado:'entregado'})
    });
    toast('Pedido finalizado ✓','ok');
    cerrarModal();
    cargarPedidos();
    cargarStats();
  } catch(e){toast('Error al finalizar','err');}
}

async function eliminarPedido(num) {
  try {
    const pR=await fetch(`${SUPA_URL}/rest/v1/pedidos?numero_pedido=eq.${encodeURIComponent(num)}`,{headers:hdrs});
    const ps=await pR.json(); const p={...ps[0]}; delete p.id;
    await fetch(`${SUPA_URL}/rest/v1/pedidos_eliminados`,{method:'POST',headers:hdrs,body:JSON.stringify({...p,eliminado_at:new Date().toISOString()})});
    await fetch(`${SUPA_URL}/rest/v1/pedidos?numero_pedido=eq.${encodeURIComponent(num)}`,{method:'DELETE',headers:hdrs});
    toast('Pedido eliminado','ok'); cerrarModal(); cargarPedidos(); cargarStats();
  } catch(e){toast('Error al eliminar','err');}
}

async function restaurarPedido(num) {
  try {
    const pR=await fetch(`${SUPA_URL}/rest/v1/pedidos_eliminados?numero_pedido=eq.${encodeURIComponent(num)}`,{headers:hdrs});
    const ps=await pR.json(); const p={...ps[0]}; delete p.id; delete p.eliminado_at;
    await fetch(`${SUPA_URL}/rest/v1/pedidos`,{method:'POST',headers:hdrs,body:JSON.stringify(p)});
    await fetch(`${SUPA_URL}/rest/v1/pedidos_eliminados?numero_pedido=eq.${encodeURIComponent(num)}`,{method:'DELETE',headers:hdrs});
    toast('Pedido restaurado ✓','ok'); cerrarModal(); cargarEliminados(); cargarStats();
  } catch(e){toast('Error al restaurar','err');}
}

function cerrarModal(e){
  if(!e||e.target===document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

// Cerrar modal solo si no hubo selección de texto (drag)
(function(){
  var overlay = document.getElementById('overlay');
  var mouseDownTarget = null;
  var mouseDownX = 0, mouseDownY = 0;
  overlay.addEventListener('mousedown', function(e){
    mouseDownTarget = e.target;
    mouseDownX = e.clientX;
    mouseDownY = e.clientY;
  });
  overlay.addEventListener('mouseup', function(e){
    var dx = Math.abs(e.clientX - mouseDownX);
    var dy = Math.abs(e.clientY - mouseDownY);
    var wasDrag = dx > 5 || dy > 5;
    if (!wasDrag && e.target === overlay) {
      overlay.classList.remove('open');
    }
  });
  // Touch
  var touchStartX = 0, touchStartY = 0;
  overlay.addEventListener('touchstart', function(e){
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive:true});
  overlay.addEventListener('touchend', function(e){
    var dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
    var dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    if (dx < 10 && dy < 10 && e.target === overlay) {
      overlay.classList.remove('open');
    }
  });
})();

function toast(msg,tipo){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show '+(tipo||'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='',3000);
}
