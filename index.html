<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <title>Blinky MDQ</title>
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100vw; }
        .font-brand { font-family: 'Montserrat', sans-serif; }
        .precio-mayorista { display: none; }
        .is-logged-in .precio-mayorista { display: block; }
        
        .contenedor-logo { position: relative; overflow: hidden; display: flex; justify-content: center; width: 100%; }
        .contenedor-logo::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
            transform: skewX(-25deg); animation: destello 4s infinite;
        }
        @keyframes destello { 0% { left: -150%; } 30% { left: 150%; } 100% { left: 150%; } }

        .img-container { width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; background: #ffffff; border-radius: 1.5rem; overflow: hidden; }
        .img-container img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        .img-container-placa { 
            width: 100%; height: 320px; display: flex; align-items: center; justify-content: center; 
            background: #f8fafc; border-radius: 2rem; overflow: hidden; padding: 20px;
        }
        .img-container-placa img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.05)); }
        
        .product-title { height: 2.5rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .placa-entrada { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white sticky top-0 z-40 border-b border-slate-100 shadow-sm w-full">
        <div class="w-full bg-white flex justify-center border-b border-slate-50">
            <div class="contenedor-logo">
                <img src="logo-mobile.png" alt="Blinky MDQ" class="block md:hidden w-full h-auto object-contain" onerror="this.style.display='none'; document.getElementById('logo-backup').classList.remove('hidden')">
                <img src="logo-desktop.png" alt="Blinky MDQ" class="hidden md:block w-full max-w-7xl h-auto object-contain" onerror="this.style.display='none'; document.getElementById('logo-backup').classList.remove('hidden')">
            </div>
            <div id="logo-backup" class="hidden flex flex-col items-center py-10">
                <h1 class="font-brand text-4xl font-black text-slate-800 tracking-tighter">BLINKY<span class="text-violet-600">MDQ</span></h1>
            </div>
        </div>

        <div class="max-w-7xl mx-auto py-3 space-y-3">
            <div class="flex gap-2 px-4">
                <button onclick="filtrarOfertas()" class="h-11 bg-rose-500 text-white px-4 rounded-2xl shadow-lg shadow-rose-100">🔥</button>
                <input type="text" id="inputBusqueda" oninput="ejecutarFiltros()" placeholder="Buscar producto..." class="h-11 flex-grow p-4 bg-slate-100 border-none rounded-2xl text-xs outline-none shadow-inner">
            </div>
            <div class="flex gap-2 px-4">
                <select id="selectCat" onchange="ejecutarFiltros()" class="flex-1 h-11 bg-white border border-slate-200 rounded-2xl px-3 text-[10px] font-bold uppercase text-slate-500 outline-none"><option value="">Categorías</option></select>
                <select id="selectMarca" onchange="ejecutarFiltros()" class="flex-1 h-11 bg-white border border-slate-200 rounded-2xl px-3 text-[10px] font-bold uppercase text-slate-500 outline-none"><option value="">Marcas</option></select>
            </div>
            <div class="px-4 pb-1">
                <button onclick="mostrarLogin()" id="btn-login" class="h-9 w-full text-[10px] font-black uppercase text-slate-400 bg-slate-50 rounded-2xl border border-slate-100 tracking-widest">LOG IN</button>
                <div id="user-badge" onclick="cerrarSesion()" class="hidden h-9 w-full flex items-center justify-center gap-2 text-[9px] bg-violet-600 text-white px-5 rounded-2xl font-black uppercase cursor-pointer shadow-lg shadow-violet-200"></div>
            </div>
        </div>
    </header>

    <main id="contenedor" class="p-4 max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
        <div class="col-span-full text-center py-20 text-slate-300 font-bold uppercase text-[10px]">Cargando catálogo...</div>
    </main>

    <div id="modalProducto" class="hidden fixed inset-0 z-50 flex items-end md:items-center justify-center bg-slate-900/80 backdrop-blur-sm p-0 md:p-4" onclick="cerrarPlaca(event)">
        <div class="bg-white w-full max-w-lg rounded-t-[2.5rem] md:rounded-[3rem] overflow-hidden shadow-2xl placa-entrada" onclick="event.stopPropagation()">
            <div class="relative p-6 md:p-8">
                <button onclick="cerrarPlaca()" class="absolute top-6 right-6 bg-white/80 backdrop-blur shadow-md w-10 h-10 rounded-full flex items-center justify-center text-slate-800 font-bold z-10">✕</button>
                <div class="img-container-placa mb-6"><img id="modalImg" src="" alt="" onerror="this.src='sin-foto.png'"></div>
                <div class="space-y-1">
                    <p id="modalInfo" class="text-[10px] font-black text-violet-500 uppercase tracking-[0.2em]"></p>
                    <h2 id="modalNombre" class="text-2xl font-black text-slate-900 leading-tight uppercase"></h2>
                    <p id="modalCodigo" class="text-[11px] font-bold text-slate-400 uppercase tracking-widest"></p>
                    <div class="py-5 border-y border-slate-100 my-5">
                        <div class="flex items-baseline gap-2">
                            <span class="text-[10px] font-black text-violet-600 uppercase">Público</span>
                            <div id="modalPrecioPub" class="text-4xl font-black text-violet-600 tracking-tighter"></div>
                        </div>
                        <div id="modalPrecioMay" class="precio-mayorista mt-2">
                            <div class="flex items-baseline gap-2">
                                <span class="text-[10px] font-black text-slate-400 uppercase">Mayorista</span>
                                <div class="text-2xl font-black text-slate-400 opacity-60 tracking-tighter"></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <button id="btnConsultarModal" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-2">
                            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                            CONSULTAR
                        </button>
                        <button id="btnCompartirModal" class="w-full bg-[#25D366] text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
                            Enviar a un amigo
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modalLogin" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 uppercase mb-6 tracking-tighter">Acceso Clientes</h3>
            <input type="text" id="userInput" placeholder="Usuario" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 text-center font-bold outline-none">
            <input type="password" id="passInput" placeholder="Contraseña" class="w-full p-4 bg-slate-100 rounded-2xl mb-6 text-center font-bold outline-none">
            <button onclick="validarAcceso()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-xs uppercase transition-colors">Entrar</button>
            <button onclick="document.getElementById('modalLogin').classList.add('hidden')" class="mt-6 text-slate-400 text-[9px] font-black uppercase">Cerrar</button>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQsX_fc7ypz3mVNMQcI8boTIzligB9QblZP6pcnVrvKciX2xCl3XYpejlHOa3vz4AgmIXOEzkG1TjQZ/pub?gid=1607701576&single=true&output=csv'; 
        const USERS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQsX_fc7ypz3mVNMQcI8boTIzligB9QblZP6pcnVrvKciX2xCl3XYpejlHOa3vz4AgmIXOEzkG1TjQZ/pub?gid=100151244&single=true&output=csv'; 
        let productos = []; let baseUsuarios = []; let filtrados = [];

        async function cargarDatos() {
            try {
                const resP = await fetch(SHEET_URL); const dataP = await resP.text();
                const filasP = dataP.split(/\r?\n/).filter(linea => linea.trim() !== "").slice(1);
                productos = filasP.map((f, index) => {
                    let c = f.split(';'); if (c.length < 5) c = f.split(',');
                    const limpiarPrecio = (v) => v ? v.replace(/["$\s]/g, '').replace(',', '.') : "0";
                    return {
                        id: index, codigo: (c[0]||"").trim(), nombre: (c[1]||"").trim(), foto: (c[2]||"").trim(),
                        cat: (c[4]||"").trim(), marca: (c[6]||"").trim(), precioP: limpiarPrecio(c[7]), precioM: limpiarPrecio(c[8]),
                        esOferta: (c[9]||"").toUpperCase().includes("SI")
                    };
                }).filter(p => p.nombre !== "");

                const resU = await fetch(USERS_URL); const dataU = await resU.text();
                const filasU = dataU.split(/\r?\n/).filter(l => l.trim() !== "").slice(1);
                baseUsuarios = filasU.map(f => {
                    let c = f.split(';'); if (c.length < 2) c = f.split(',');
                    return { user: c[0].trim(), pass: c[1].trim() };
                });

                llenarSelect('selectCat', 'cat'); llenarSelect('selectMarca', 'marca');
                const urlParams = new URLSearchParams(window.location.search);
                const queryBusqueda = urlParams.get('buscar');
                if (queryBusqueda) { document.getElementById('inputBusqueda').value = decodeURIComponent(queryBusqueda).replace(/_/g, ' '); }
                ejecutarFiltros();
            } catch (e) { console.error(e); }
        }

        const llenarSelect = (id, prop) => {
            const vals = [...new Set(productos.map(p => p[prop]))].filter(Boolean).sort();
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">${id==='selectCat'?'Categorías':'Marcas'}</option>`;
            vals.forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`);
        };

        function render(lista) {
            filtrados = lista;
            const box = document.getElementById('contenedor'); box.innerHTML = '';
            lista.forEach((p, idx) => {
                let img = p.foto; 
                if(!img) img = 'sin-foto.png';
                else if(img.includes('id=')) img = `https://drive.google.com/thumbnail?id=${img.split('id=')[1].split('&')[0]}&sz=400`;
                
                const palabras = p.nombre.split(' ').filter(x => x.length > 2).slice(0, 3).join('_');
                const linkBusqueda = window.location.href.split('?')[0] + "?buscar=" + encodeURIComponent(palabras);
                const msjCons = `Hola Blinky! Me interesa este producto:%0A%0A🛍️ *${p.nombre}*%0A🔢 Cód: ${p.codigo}%0A%0AVer en catálogo:%0A${linkBusqueda}`;
                const msjComp = `¡Mirá esto en *Blinky MDQ*!%0A%0A🛍️ *${p.nombre}*%0A💰 Precio: *$${(parseFloat(p.precioP)||0).toLocaleString('es-AR')}*%0A%0AVer aquí: ${linkBusqueda}`;

                box.innerHTML += `
                    <div class="bg-white rounded-[1.5rem] p-3 border border-slate-100 shadow-sm flex flex-col justify-between hover:shadow-lg transition-all">
                        <div onclick="abrirPlacaPorIdx(${idx})" class="cursor-pointer">
                            <div class="relative">
                                ${p.esOferta ? '<span class="absolute top-1 left-1 bg-rose-500 text-white text-[7px] font-black px-2 py-0.5 rounded-full z-10">OFERTA</span>' : ''}
                                <div class="img-container"><img src="${img}" alt="${p.nombre}" onerror="this.src='sin-foto.png'"></div>
                                <p class="text-[6px] font-black text-violet-400 uppercase mb-0.5 mt-1">${p.marca}</p>
                                <h2 class="text-[9px] font-bold text-slate-800 leading-tight uppercase product-title">${p.nombre}</h2>
                            </div>
                            <div class="mt-2 text-sm font-black text-violet-600">$${(parseFloat(p.precioP)||0).toLocaleString('es-AR')}</div>
                        </div>
                        <div class="flex gap-1.5 mt-3 pt-3 border-t border-slate-50 h-10 items-center">
                            <button onclick="window.open('https://wa.me/5492235910492?text=${msjCons}')" class="flex-1 h-full bg-slate-900 text-white rounded-xl flex items-center justify-center gap-1.5 active:scale-95 transition-transform text-[7px] font-black uppercase leading-none">
                                <svg class="w-3 h-3 fill-current" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                Consultar
                            </button>
                            <button onclick="window.open('https://wa.me/?text=${msjComp}')" class="flex-1 h-full bg-[#25D366] text-white rounded-xl flex items-center justify-center gap-1.5 active:scale-95 transition-transform text-[7px] font-black uppercase leading-[1.1] text-center px-1">
                                <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
                                <span>Enviar a<br>un amigo</span>
                            </button>
                        </div>
                    </div>`;
            });
        }

        function abrirPlacaPorIdx(idx) {
            const p = filtrados[idx];
            let img = p.foto;
            if(!img) img = 'sin-foto.png';
            else if(img.includes('id=')) img = `https://drive.google.com/thumbnail?id=${img.split('id=')[1].split('&')[0]}&sz=800`;
            const pPub = (parseFloat(p.precioP)||0).toLocaleString('es-AR');
            
            document.getElementById('modalImg').src = img;
            document.getElementById('modalNombre').innerText = p.nombre;
            document.getElementById('modalInfo').innerText = `${p.cat} | ${p.marca}`;
            document.getElementById('modalCodigo').innerText = `ARTÍCULO: ${p.codigo}`;
            document.getElementById('modalPrecioPub').innerText = `$${pPub}`;
            document.querySelector('#modalPrecioMay div').innerText = `$${(parseFloat(p.precioM)||0).toLocaleString('es-AR')}`;
            
            document.getElementById('btnConsultarModal').onclick = () => {
                const palabras = p.nombre.split(' ').filter(x => x.length > 2).slice(0, 3).join('_');
                const link = window.location.href.split('?')[0] + "?buscar=" + encodeURIComponent(palabras);
                const msj = `Hola Blinky! Me interesa este producto:%0A%0A🛍️ *${p.nombre}*%0A🔢 Cód: ${p.codigo}%0A%0AVer en catálogo:%0A${link}`;
                window.open(`https://wa.me/5492235910492?text=${msj}`);
            };

            document.getElementById('btnCompartirModal').onclick = () => {
                const palabras = p.nombre.split(' ').filter(x => x.length > 2).slice(0, 3).join('_');
                const link = window.location.href.split('?')[0] + "?buscar=" + encodeURIComponent(palabras);
                const msj = `¡Mirá esto en *Blinky MDQ*!%0A%0A🛍️ *${p.nombre}*%0A💰 Precio: *$${pPub}*%0A%0AVer aquí: ${link}`;
                window.open(`https://wa.me/?text=${msj}`);
            };
            
            document.getElementById('modalProducto').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function cerrarPlaca() { document.getElementById('modalProducto').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        
        function ejecutarFiltros() {
            const val = document.getElementById('inputBusqueda').value.toLowerCase().trim();
            const c = document.getElementById('selectCat').value;
            const m = document.getElementById('selectMarca').value;
            const res = productos.filter(p => {
                const coincideTxt = val === "" || val.split(/\s+/).every(w => p.nombre.toLowerCase().includes(w) || p.codigo.toLowerCase().includes(w));
                return coincideTxt && (c === "" || p.cat === c) && (m === "" || p.marca === m);
            });
            render(res);
        }

        function mostrarLogin() { document.getElementById('modalLogin').classList.remove('hidden'); }
        function validarAcceso() {
            const u = document.getElementById('userInput').value.trim().toLowerCase();
            const p = document.getElementById('passInput').value.trim();
            if(baseUsuarios.find(x => x.user.toLowerCase() === u && x.pass === p) || (u === "admin" && p === "blinky2024")) {
                document.body.classList.add('is-logged-in'); document.getElementById('modalLogin').classList.add('hidden');
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-badge').innerHTML = `HOLA, ${u.toUpperCase()} <span class="ml-1 opacity-50">✕</span>`;
                document.getElementById('user-badge').classList.remove('hidden');
            } else { alert("Datos incorrectos"); }
        }
        function cerrarSesion() { document.body.classList.remove('is-logged-in'); document.getElementById('btn-login').classList.remove('hidden'); document.getElementById('user-badge').classList.add('hidden'); }
        function filtrarOfertas() { render(productos.filter(p => p.esOferta)); }
        cargarDatos();
    </script>
</body>
</html>
