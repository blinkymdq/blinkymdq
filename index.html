<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <title>Blinky MDQ</title>
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100vw; }
        .font-brand { font-family: 'Montserrat', sans-serif; }
        .precio-mayorista { display: none; }
        .is-logged-in .precio-mayorista { display: block; }
        
        /* Efecto Destello Logo */
        .contenedor-logo { position: relative; overflow: hidden; display: flex; justify-content: center; width: 100%; }
        .contenedor-logo::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
            transform: skewX(-25deg); animation: destello 4s infinite;
        }
        @keyframes destello { 0% { left: -150%; } 30% { left: 150%; } 100% { left: 150%; } }

        /* Banner Slider */
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; scroll-behavior: smooth; }

        /* Centrado Óptico y Contenedores */
        .img-container { width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; background: #ffffff; border-radius: 1.5rem; overflow: hidden; }
        .img-container img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        .img-container-placa { 
            width: 100%; height: 320px; display: flex; align-items: center; justify-content: center; 
            background: #f8fafc; border-radius: 2rem; overflow: hidden; padding: 20px;
        }
        .img-container-placa img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.05)); }
        
        .product-title { height: 2.5rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .placa-entrada { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white sticky top-0 z-40 border-b border-slate-100 shadow-sm w-full">
        <div class="w-full bg-white flex justify-center border-b border-slate-50">
            <div class="contenedor-logo">
                <img src="logo-mobile.png" alt="Blinky MDQ" class="block md:hidden w-full h-auto object-contain" onerror="this.style.display='none'; document.getElementById('logo-backup').classList.remove('hidden')">
                <img src="logo-desktop.png" alt="Blinky MDQ" class="hidden md:block w-full max-w-7xl h-auto object-contain" onerror="this.style.display='none'; document.getElementById('logo-backup').classList.remove('hidden')">
            </div>
            <div id="logo-backup" class="hidden flex flex-col items-center py-10">
                <h1 class="font-brand text-4xl font-black text-slate-800 tracking-tighter">BLINKY<span class="text-violet-600">MDQ</span></h1>
            </div>
        </div>

        <div class="max-w-7xl mx-auto py-3 space-y-3">
            <div class="flex gap-2 px-4">
                <button onclick="filtrarOfertas()" class="h-11 bg-rose-500 text-white px-4 rounded-2xl shadow-lg shadow-rose-100">🔥</button>
                <input type="text" id="inputBusqueda" oninput="ejecutarFiltros()" placeholder="Buscar producto..." class="h-11 flex-grow p-4 bg-slate-100 border-none rounded-2xl text-xs outline-none shadow-inner">
            </div>
            
            <div class="grid grid-cols-2 gap-2 px-4">
                <select id="selectCat" onchange="ejecutarFiltros()" class="h-11 bg-white border border-slate-200 rounded-2xl px-3 text-[10px] font-bold uppercase text-slate-500 outline-none truncate w-full">
                    <option value="">Categorías</option>
                </select>
                <select id="selectMarca" onchange="ejecutarFiltros()" class="h-11 bg-white border border-slate-200 rounded-2xl px-3 text-[10px] font-bold uppercase text-slate-500 outline-none truncate w-full">
                    <option value="">Marcas</option>
                </select>
            </div>

            <div class="px-4 pb-1">
                <button onclick="mostrarLogin()" id="btn-login" class="h-9 w-full text-[10px] font-black uppercase text-slate-400 bg-slate-50 rounded-2xl border border-slate-100 tracking-widest">LOG IN</button>
                <div id="user-badge" onclick="cerrarSesion()" class="hidden h-9 w-full flex items-center justify-center gap-2 text-[9px] bg-violet-600 text-white px-5 rounded-2xl font-black uppercase cursor-pointer shadow-lg shadow-violet-200"></div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto pb-10">
        <div id="seccionBanner" class="mt-4 px-4 relative group">
            <div class="relative overflow-hidden rounded-[2.5rem] shadow-xl shadow-slate-200">
                <button onclick="scrollBanner(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 z-10 bg-white/40 hover:bg-white/60 backdrop-blur-md text-slate-800 w-10 h-10 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
                </button>

                <div id="contenedorBanner" class="flex overflow-x-auto snap-x snap-mandatory gap-0 scroll-hide"></div>

                <button onclick="scrollBanner(1)" class="absolute right-4 top-1/2 -translate-y-1/2 z-10 bg-white/40 hover:bg-white/60 backdrop-blur-md text-slate-800 w-10 h-10 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>
            <div id="indicadoresBanner" class="flex justify-center gap-1.5 mt-3"></div>
        </div>

        <div id="contenedor" class="p-4 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </main>

    <div id="modalProducto" class="hidden fixed inset-0 z-50 flex items-end md:items-center justify-center bg-slate-900/80 backdrop-blur-sm p-0 md:p-4" onclick="cerrarPlaca()">
        <div class="bg-white w-full max-w-lg rounded-t-[2.5rem] md:rounded-[3rem] overflow-hidden shadow-2xl placa-entrada" onclick="event.stopPropagation()">
            <div class="relative p-6 md:p-8">
                <button onclick="cerrarPlaca()" class="absolute top-6 right-6 bg-white/80 backdrop-blur shadow-md w-10 h-10 rounded-full flex items-center justify-center text-slate-800 font-bold z-10">✕</button>
                <div class="img-container-placa mb-6"><img id="modalImg" src="" alt="" onerror="this.src='sin-foto.png'"></div>
                <div class="space-y-1">
                    <p id="modalInfo" class="text-[10px] font-black text-violet-500 uppercase tracking-[0.2em]"></p>
                    <h2 id="modalNombre" class="text-2xl font-black text-slate-900 leading-tight uppercase"></h2>
                    <p id="modalCodigo" class="text-[11px] font-bold text-slate-400 uppercase tracking-widest"></p>
                    <div class="py-5 border-y border-slate-100 my-5">
                        <div class="flex items-baseline gap-2">
                            <span class="text-[10px] font-black text-violet-600 uppercase">Público</span>
                            <div id="modalPrecioPub" class="text-4xl font-black text-violet-600 tracking-tighter"></div>
                        </div>
                        <div id="modalPrecioMay" class="precio-mayorista mt-2">
                            <div class="flex items-baseline gap-2">
                                <span class="text-[10px] font-black text-slate-400 uppercase">Mayorista</span>
                                <div class="text-2xl font-black text-slate-400 opacity-60 tracking-tighter"></div>
                            </div>
                        </div>
                    </div>
                    <button id="btnConsultarModal" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest flex items-center justify-center gap-2 shadow-xl active:scale-95 transition-transform">CONSULTAR WHATSAPP</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalLogin" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 uppercase mb-6 tracking-tighter">Acceso Clientes</h3>
            <input type="text" id="userInput" placeholder="Usuario" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 text-center font-bold outline-none">
            <input type="password" id="passInput" placeholder="Contraseña" class="w-full p-4 bg-slate-100 rounded-2xl mb-6 text-center font-bold outline-none">
            <button onclick="validarAcceso()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-xs uppercase">Entrar</button>
        </div>
    </div>

    <script>
        // --- INTERRUPTOR DE BANNER ---
        const MOSTRAR_SLIDER = true; // Cambiá a false para quitar el banner
        
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQsX_fc7ypz3mVNMQcI8boTIzligB9QblZP6pcnVrvKciX2xCl3XYpejlHOa3vz4AgmIXOEzkG1TjQZ/pub?gid=1607701576&single=true&output=csv'; 
        const USERS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQsX_fc7ypz3mVNMQcI8boTIzligB9QblZP6pcnVrvKciX2xCl3XYpejlHOa3vz4AgmIXOEzkG1TjQZ/pub?gid=100151244&single=true&output=csv'; 
        
        const USUARIO_GIT = "blinkymdq"; 
        const REPO_GIT = "blinkymdq";
        const misDestacados = [
            { img: "foto1.jpeg", codigo: "" },
            { img: "foto2.jpeg", codigo: "" },
            { img: "foto3.jpeg", codigo: "" },
            { img: "foto4.jpeg", codigo: "" },
            { img: "foto5.jpeg", codigo: "" }
        ];

        let productos = []; let baseUsuarios = []; let filtrados = [];

        async function cargarDatos() {
            try {
                const resP = await fetch(SHEET_URL); const dataP = await resP.text();
                const filasP = dataP.split(/\r?\n/).filter(linea => linea.trim() !== "").slice(1);
                productos = filasP.map((f, index) => {
                    const c = f.match(/(".*?"|[^,;]+)(?=\s*[,;]|\s*$)/g) || [];
                    const limpiar = (v) => v ? v.trim().replace(/^"|"$/g, '') : "";
                    return {
                        id: index, codigo: limpiar(c[0]), nombre: limpiar(c[1]), foto: limpiar(c[2]),
                        cat: limpiar(c[4]), marca: limpiar(c[6]), 
                        precioP: (c[7]||"0").replace(/["$\s]/g, '').replace(',', '.'),
                        precioM: (c[8]||"0").replace(/["$\s]/g, '').replace(',', '.'),
                        esOferta: (c[9]||"").toUpperCase().includes("SI")
                    };
                }).filter(p => p.nombre !== "");

                const resU = await fetch(USERS_URL); const dataU = await resU.text();
                const filasU = dataU.split(/\r?\n/).filter(l => l.trim() !== "").slice(1);
                baseUsuarios = filasU.map(f => {
                    let c = f.split(';'); if (c.length < 2) c = f.split(',');
                    return { user: c[0].trim(), pass: c[1].trim() };
                });

                llenarSelect('selectCat', 'cat'); llenarSelect('selectMarca', 'marca');
                cargarBanner();
                ejecutarFiltros();
            } catch (e) { console.error(e); }
        }

        function cargarBanner() {
            const seccion = document.getElementById('seccionBanner');
            if (!MOSTRAR_SLIDER) { seccion.style.display = 'none'; return; }

            const box = document.getElementById('contenedorBanner');
            const dots = document.getElementById('indicadoresBanner');
            box.innerHTML = ''; dots.innerHTML = '';
            misDestacados.forEach((item, idx) => {
                const url = `https://raw.githubusercontent.com/${USUARIO_GIT}/${REPO_GIT}/main/destacados/${item.img}`;
                box.innerHTML += `<div class="flex-shrink-0 w-full snap-center cursor-pointer"><img src="${url}" class="w-full h-[220px] md:h-[450px] object-cover" onerror="this.parentElement.remove()"></div>`;
                dots.innerHTML += `<div class="w-2 h-2 rounded-full bg-slate-200 transition-all cursor-pointer" onclick="goToSlide(${idx})"></div>`;
            });
            box.addEventListener('scroll', updateDots);
            updateDots();
            
            setInterval(() => {
                if (!document.getElementById('inputBusqueda').value) scrollBanner(1);
            }, 3000);
        }

        function scrollBanner(direction) {
            const box = document.getElementById('contenedorBanner');
            const scrollAmount = box.offsetWidth;
            if (direction === 1 && (box.scrollLeft + scrollAmount) >= box.scrollWidth - 10) {
                box.scrollTo({ left: 0, behavior: 'smooth' });
            } else if (direction === -1 && box.scrollLeft <= 0) {
                box.scrollTo({ left: box.scrollWidth, behavior: 'smooth' });
            } else {
                box.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
            }
        }

        function goToSlide(i) {
            const box = document.getElementById('contenedorBanner');
            box.scrollTo({ left: i * box.offsetWidth, behavior: 'smooth' });
        }

        function updateDots() {
            const box = document.getElementById('contenedorBanner');
            const dots = document.getElementById('indicadoresBanner');
            if(!dots.children.length || box.offsetWidth === 0) return;
            const i = Math.round(box.scrollLeft / box.offsetWidth);
            Array.from(dots.children).forEach((d, idx) => {
                d.style.backgroundColor = i === idx ? '#7c3aed' : '#e2e8f0';
                d.style.width = i === idx ? '16px' : '8px';
            });
        }

        function render(lista) {
            filtrados = lista;
            const box = document.getElementById('contenedor'); box.innerHTML = '';
            const hayFiltro = document.getElementById('inputBusqueda').value || document.getElementById('selectCat').value || document.getElementById('selectMarca').value;
            document.getElementById('seccionBanner').style.display = (hayFiltro || !MOSTRAR_SLIDER) ? 'none' : 'block';
            
            lista.forEach((p, idx) => {
                box.innerHTML += `
                    <div onclick="abrirPlacaPorIdx(${idx})" class="bg-white rounded-[1.5rem] p-3 border border-slate-100 shadow-sm flex flex-col justify-between hover:shadow-lg transition-all cursor-pointer">
                        <div class="relative">
                            ${p.esOferta ? '<span class="absolute top-1 left-1 bg-rose-500 text-white text-[7px] font-black px-2 py-0.5 rounded-full z-10">OFERTA</span>' : ''}
                            <div class="img-container"><img src="${formatearImg(p.foto)}" onerror="this.src='sin-foto.png'"></div>
                            <p class="text-[6px] font-black text-violet-400 uppercase mb-0.5 mt-1">${p.marca}</p>
                            <h2 class="text-[9px] font-bold text-slate-800 leading-tight uppercase product-title">${p.nombre}</h2>
                        </div>
                        <div class="mt-2 text-sm font-black text-violet-600">$${(parseFloat(p.precioP)||0).toLocaleString('es-AR')}</div>
                    </div>`;
            });
        }

        function abrirPlacaPorIdx(idx) {
            const p = filtrados[idx];
            document.getElementById('modalImg').src = formatearImg(p.foto);
            document.getElementById('modalNombre').innerText = p.nombre;
            document.getElementById('modalInfo').innerText = `${p.cat} | ${p.marca}`;
            document.getElementById('modalCodigo').innerText = `ARTÍCULO: ${p.codigo}`;
            document.getElementById('modalPrecioPub').innerText = `$${(parseFloat(p.precioP)||0).toLocaleString('es-AR')}`;
            document.querySelector('#modalPrecioMay div').innerText = `$${(parseFloat(p.precioM)||0).toLocaleString('es-AR')}`;
            document.getElementById('btnConsultarModal').onclick = () => window.open(`https://wa.me/5492235910492?text=Me interesa: ${p.nombre} (${p.codigo})`);
            document.getElementById('modalProducto').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function formatearImg(u) {
            if(!u) return 'sin-foto.png';
            if(u.includes('id=')) return `https://drive.google.com/thumbnail?id=${u.split('id=')[1].split('&')[0]}&sz=800`;
            return u;
        }

        function ejecutarFiltros() {
            const val = document.getElementById('inputBusqueda').value.toLowerCase();
            const c = document.getElementById('selectCat').value;
            const m = document.getElementById('selectMarca').value;
            render(productos.filter(p => {
                const coincide = val === "" || p.nombre.toLowerCase().includes(val) || p.codigo.toLowerCase().includes(val);
                return coincide && (c === "" || p.cat === c) && (m === "" || p.marca === m);
            }));
        }

        const llenarSelect = (id, prop) => {
            const vals = [...new Set(productos.map(p => p[prop]))].filter(v => v).sort();
            const el = document.getElementById(id);
            vals.forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`);
        };

        function mostrarLogin() { document.getElementById('modalLogin').classList.remove('hidden'); }
        function validarAcceso() {
            const u = document.getElementById('userInput').value.trim();
            const p = document.getElementById('passInput').value.trim();
            if(baseUsuarios.find(x => x.user === u && x.pass === p) || (u === "admin" && p === "blinky2024")) {
                document.body.classList.add('is-logged-in'); 
                document.getElementById('modalLogin').classList.add('hidden');
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-badge').innerHTML = `HOLA, ${u.toUpperCase()} <span class="ml-1 opacity-50">✕</span>`;
                document.getElementById('user-badge').classList.remove('hidden');
            } else { alert("Error"); }
        }
        function cerrarSesion() { location.reload(); }
        function cerrarPlaca() { document.getElementById('modalProducto').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function filtrarOfertas() { render(productos.filter(p => p.esOferta)); }
        
        cargarDatos();
    </script>
</body>
</html>
