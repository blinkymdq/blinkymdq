<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <title>Blinky MDQ - Catálogo</title>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-brand { font-family: 'Montserrat', sans-serif; }
        .precio-mayorista-oculto { display: none; }
        .is-logged-in .precio-mayorista-oculto { display: block; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-violet-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-violet-200">B</div>
                    <h1 class="font-brand text-2xl font-black tracking-tighter text-slate-800">BLINKY<span class="text-violet-600">MDQ</span></h1>
                </div>

                <div class="flex items-center gap-3">
                    <button onclick="mostrarLogin()" id="btn-login" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-violet-600 transition-all flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        Mayoristas
                    </button>
                    <div id="user-badge" class="hidden bg-violet-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase">Modo Mayorista</div>
                </div>
            </div>

            <div class="flex flex-wrap gap-2">
                <button onclick="filtrarOfertas()" class="bg-rose-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-rose-100 hover:scale-105 transition-all">🔥 Ofertas</button>
                <input type="text" id="inputBusqueda" oninput="ejecutarFiltros()" placeholder="Buscar producto..." class="flex-grow p-2.5 bg-slate-100 border-none rounded-xl text-xs focus:ring-2 focus:ring-violet-400 outline-none">
                <select id="selectCat" onchange="ejecutarFiltros()" class="p-2.5 bg-white border border-slate-200 rounded-xl text-[10px] font-bold uppercase outline-none text-slate-500"><option value="">Categorías</option></select>
                <select id="selectMarca" onchange="ejecutarFiltros()" class="p-2.5 bg-white border border-slate-200 rounded-xl text-[10px] font-bold uppercase outline-none text-slate-500"><option value="">Marcas</option></select>
            </div>
        </div>
    </header>

    <main id="contenedor" class="p-4 max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
        <div class="col-span-full text-center py-20 text-slate-400 animate-pulse">Cargando catálogo...</div>
    </main>

    <footer class="p-10 text-center">
        <p class="text-violet-600 font-bold text-[10px] uppercase tracking-widest">
            Los precios pueden sufrir modificaciones sin previo aviso.
        </p>
    </footer>

    <div id="modalLogin" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl fade-in">
            <div class="text-center mb-6">
                <h3 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Acceso Mayorista</h3>
                <p class="text-slate-400 text-xs mt-2">Ingresá la clave para ver precios exclusivos.</p>
            </div>
            <input type="password" id="passKey" placeholder="Contraseña" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 border-none focus:ring-2 focus:ring-violet-400 text-center font-bold">
            <button onclick="validarAcceso()" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-violet-600 transition-all shadow-xl">Entrar</button>
            <button onclick="document.getElementById('modalLogin').classList.add('hidden')" class="w-full mt-4 text-slate-400 text-[10px] font-black uppercase">Cerrar</button>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQsX_fc7ypz3mVNMQcI8boTIzligB9QblZP6pcnVrvKciX2xCl3XYpejlHOa3vz4AgmIXOEzkG1TjQZ/pub?gid=1607701576&single=true&output=csv'; 
        let productos = [];

        async function cargar() {
            try {
                const res = await fetch(SHEET_URL);
                const data = await res.text();
                const filas = data.split(/\r?\n/).filter(linea => linea.trim() !== "").slice(1);
                
                productos = filas.map(f => {
                    let c = f.split(';');
                    if (c.length < 5) c = f.split(',');
                    if (c.length < 8) return null;

                    const limpiarPrecio = (val) => {
                        if(!val) return "0";
                        let limpio = val.replace(/["$\s]/g, '');
                        if (limpio.includes(',') && limpio.includes('.')) {
                            limpio = limpio.replace(/\./g, '').replace(',', '.');
                        } else if (limpio.includes(',')) {
                            limpio = limpio.replace(',', '.');
                        } else if (limpio.split('.').length > 2 || (limpio.split('.').length === 2 && limpio.split('.')[1].length > 2)) {
                            limpio = limpio.replace(/\./g, '');
                        }
                        return limpio;
                    };

                    return {
                        codigo:  (c[0] || "").replace(/"/g, '').trim(),
                        nombre:  (c[1] || "").replace(/"/g, '').trim(),
                        foto:    (c[2] || "").replace(/"/g, '').trim(), 
                        cat:     (c[4] || "").replace(/"/g, '').trim(),
                        marca:   (c[6] || "").replace(/"/g, '').trim(),
                        precioP: limpiarPrecio(c[7]),
                        precioM: limpiarPrecio(c[8]),
                        esOferta: (c[9] || "").toUpperCase().includes("SI") // Columna J (index 9)
                    };
                }).filter(p => p !== null && p.nombre !== "");

                const llenarSelect = (id, propiedad) => {
                    const valores = [...new Set(productos.map(p => p[propiedad]))].filter(Boolean).sort();
                    const el = document.getElementById(id);
                    valores.forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`);
                };

                llenarSelect('selectCat', 'cat');
                llenarSelect('selectMarca', 'marca');
                render(productos);
            } catch (e) { document.getElementById('contenedor').innerHTML = "Error al conectar."; }
        }

        function render(lista) {
            const box = document.getElementById('contenedor');
            box.innerHTML = '';
            lista.forEach(p => {
                let img = p.foto;
                if(img.includes('id=')) {
                    const id = img.split('id=')[1].split('&')[0];
                    img = `https://drive.google.com/thumbnail?id=${id}&sz=w500`;
                }

                const pPublico = parseFloat(p.precioP) || 0;
                const pMayor = parseFloat(p.precioM) || 0;
                const pPubFormateado = pPublico.toLocaleString('es-AR', {minimumFractionDigits: 0});

                box.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] p-4 border border-slate-100 shadow-sm flex flex-col justify-between fade-in hover:shadow-xl transition-all group">
                        <div class="relative">
                            ${p.esOferta ? '<span class="absolute top-0 left-0 bg-rose-500 text-white text-[8px] font-black px-2 py-1 rounded-lg z-10 animate-bounce">OFERTA</span>' : ''}
                            <div class="h-44 flex items-center justify-center mb-4 overflow-hidden rounded-3xl bg-white group-hover:scale-105 transition-transform">
                                <img src="${img}" class="max-h-full object-contain" onerror="this.src='https://placehold.co/400?text=Sin+Foto'">
                            </div>
                            <p class="text-[7px] font-black text-violet-500 uppercase mb-1 tracking-widest">${p.marca} • ${p.codigo}</p>
                            <h2 class="text-[11px] font-bold text-slate-800 leading-tight uppercase line-clamp-2">${p.nombre}</h2>
                        </div>
                        <div class="mt-4">
                            <div class="text-xl font-black text-slate-900 leading-none">
                                $${pPubFormateado}
                            </div>
                            <div class="precio-mayorista-oculto mt-1 text-[10px] font-bold text-violet-600 bg-violet-50 inline-block px-2 py-0.5 rounded-md">
                                MAYOR: $${pMayor.toLocaleString('es-AR')}
                            </div>
                            <div class="grid grid-cols-2 gap-2 mt-4">
                                <button onclick="pedir('${p.nombre}', '${p.codigo}')" class="bg-slate-900 text-white py-2 rounded-xl text-[9px] font-black uppercase hover:bg-violet-600 transition-colors">Pedir</button>
                                <button onclick="compartir('${p.nombre}', '${p.codigo}', '${pPubFormateado}', '${img}')" class="bg-slate-100 text-slate-400 py-2 rounded-xl flex items-center justify-center hover:bg-blue-50 hover:text-blue-500 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function ejecutarFiltros() {
            const q = document.getElementById('inputBusqueda').value.toLowerCase().trim();
            const c = document.getElementById('selectCat').value;
            const m = document.getElementById('selectMarca').value;

            const f = productos.filter(p => {
                const coincideBusqueda = q.length < 2 || p.nombre.toLowerCase().includes(q) || p.marca.toLowerCase().includes(q);
                const coincideCat = c === "" || p.cat === c;
                const coincideMarca = m === "" || p.marca === m;
                return coincideBusqueda && coincideCat && coincideMarca;
            });
            render(f);
        }

        function filtrarOfertas() {
            render(productos.filter(p => p.esOferta));
        }

        function mostrarLogin() { document.getElementById('modalLogin').classList.remove('hidden'); }
        
        function validarAcceso() {
            const pass = document.getElementById('passKey').value;
            if(pass === "blinky2024") {
                document.body.classList.add('is-logged-in');
                document.getElementById('modalLogin').classList.add('hidden');
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-badge').classList.remove('hidden');
            } else { alert("Clave incorrecta"); }
        }

        function pedir(n, c) {
            window.open(`https://wa.me/5491100000000?text=Hola Blinky! Me interesa: ${n} (Cód: ${c})`);
        }

        function compartir(n, c, p, img) {
            const texto = `Mira este producto de *Blinky MDQ*:\n\n*${n}*\nCódigo: ${c}\nPrecio: *$${p}*\n\nVer imagen: ${img}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
        }

        cargar();
    </script>
</body>
</html>
