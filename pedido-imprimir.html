<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedido Blinky MDQ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; }

  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 20px auto;
    background: white;
    padding: 20mm;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid #7c3aed;
    padding-bottom: 16px;
    margin-bottom: 24px;
  }
  .logo img { height: 48px; }
  .header-info { text-align: right; }
  .pedido-num { font-size: 28px; font-weight: 900; color: #7c3aed; letter-spacing: -1px; }
  .pedido-fecha { font-size: 12px; color: #94a3b8; margin-top: 2px; }

  /* SECCIÓN */
  .seccion {
    margin-bottom: 20px;
  }
  .seccion-titulo {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #94a3b8;
    margin-bottom: 8px;
    border-bottom: 1px solid #e2e8f0;
    padding-bottom: 4px;
  }

  /* DATOS CLIENTE */
  .datos-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 24px;
  }
  .dato { display: flex; gap: 8px; font-size: 13px; }
  .dato-key { color: #64748b; font-weight: 600; min-width: 70px; }
  .dato-val { font-weight: 700; color: #1e293b; }

  /* TABLA PRODUCTOS */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    padding: 8px 10px;
    text-align: left;
    background: #f8fafc;
    color: #64748b;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 2px solid #e2e8f0;
  }
  thead th:not(:first-child) { text-align: right; }
  tbody td {
    padding: 9px 10px;
    border-bottom: 1px solid #f1f5f9;
    color: #1e293b;
  }
  tbody td:not(:first-child) { text-align: right; }
  tfoot td {
    padding: 10px;
    font-weight: 700;
  }
  .total-label { text-align: right; color: #64748b; font-size: 13px; }
  .total-val { text-align: right; color: #7c3aed; font-size: 20px; font-weight: 900; }

  /* FOOTER */
  .footer {
    margin-top: 32px;
    padding-top: 12px;
    border-top: 1px solid #e2e8f0;
    text-align: center;
    font-size: 10px;
    color: #94a3b8;
  }

  /* BOTÓN IMPRIMIR */
  .btn-print {
    display: block;
    width: fit-content;
    margin: 16px auto;
    padding: 10px 28px;
    background: #7c3aed;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  @media print {
    body { background: white; }
    .page { margin: 0; box-shadow: none; padding: 15mm; }
    .btn-print { display: none; }
    .no-print { display: none; }
  }
</style>
</head>
<body>

<div class="no-print" style="text-align:center;padding:16px;">
  <button class="btn-print" onclick="window.print()">Imprimir / Guardar PDF</button>
</div>

<div class="page" id="pagina">
  <div class="header">
    <div class="logo">
      <img src="https://raw.githubusercontent.com/blinkymdq/blinkymdq/main/blinkysinfondo.png" alt="Blinky MDQ">
    </div>
    <div class="header-info">
      <div class="pedido-num" id="num-pedido">#0000</div>
      <div class="pedido-fecha" id="fecha-pedido"></div>
    </div>
  </div>

  <div class="seccion">
    <div class="seccion-titulo">Datos del cliente</div>
    <div class="datos-grid" id="datos-cliente"></div>
  </div>

  <div class="seccion">
    <div class="seccion-titulo">Productos</div>
    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th style="text-align:right;">Cant.</th>
          <th style="text-align:right;">P. Unit.</th>
          <th style="text-align:right;">Subtotal</th>
        </tr>
      </thead>
      <tbody id="tabla-items"></tbody>
      <tfoot>
        <tr>
          <td colspan="3" class="total-label">Total</td>
          <td class="total-val" id="total-val"></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="footer">
    Blinky MDQ &mdash; blinkymdq.com
  </div>
</div>

<script>
try {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('d');
  if (!raw) throw new Error('Sin datos');
  const d = JSON.parse(decodeURIComponent(raw));

  document.getElementById('num-pedido').textContent = d.num || '';
  document.getElementById('fecha-pedido').textContent = d.fecha || '';
  document.title = 'Pedido ' + d.num + ' - Blinky MDQ';

  const datos = [
    ['Cliente', d.nombre],
    d.telefono ? ['Telefono', d.telefono] : null,
    ['Tipo', d.tipo],
    ['Pago', d.pago],
    ['Entrega', d.entrega],
    d.notas ? ['Notas', d.notas] : null,
  ].filter(Boolean);

  document.getElementById('datos-cliente').innerHTML = datos.map(([k, v]) =>
    `<div class="dato"><span class="dato-key">${k}</span><span class="dato-val">${v}</span></div>`
  ).join('');

  document.getElementById('tabla-items').innerHTML = (d.items || []).map(i =>
    `<tr>
      <td>${i.producto}</td>
      <td style="text-align:right;">${i.cantidad}</td>
      <td style="text-align:right;">$${Number(i.precio).toLocaleString('es-AR')}</td>
      <td style="text-align:right;font-weight:700;">$${Number(i.subtotal).toLocaleString('es-AR')}</td>
    </tr>`
  ).join('');

  document.getElementById('total-val').textContent = '$' + Number(d.total).toLocaleString('es-AR');

} catch(e) {
  document.getElementById('pagina').innerHTML = '<p style="padding:2rem;color:red;">Error al cargar el pedido.</p>';
}
</script>
</body>
</html>
