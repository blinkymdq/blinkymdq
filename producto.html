<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blinky MDQ</title>
<meta property="og:type" content="product">
<meta id="og-title" property="og:title" content="Blinky MDQ">
<meta id="og-description" property="og:description" content="Perfumes, cosméticos y electrónica en Mar del Plata">
<meta id="og-image" property="og:image" content="https://blinkymdq.com/blinkysinfondo.png">
<meta id="og-url" property="og:url" content="https://blinkymdq.com">
<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; background:#f8f8fc; min-height:100vh; color:#1e293b; }

  /* HEADER */
  .header { background:white; border-bottom:1px solid #e2e8f0; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  .header img { height:40px; }
  .btn-tienda { background:#7c3aed; color:white; border:none; border-radius:10px; padding:8px 16px; font-size:0.82rem; font-weight:700; cursor:pointer; text-decoration:none; }
  .btn-tienda:hover { background:#6d28d9; }

  /* CONTENEDOR */
  .container { max-width:480px; margin:0 auto; padding:20px 16px 40px; }

  /* CARD PRODUCTO */
  .card { background:white; border-radius:20px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,0.08); }

  /* GALERÍA */
  .galeria { position:relative; background:#f1f5f9; aspect-ratio:1; overflow:hidden; }
  .galeria img { width:100%; height:100%; object-fit:contain; cursor:pointer; transition:opacity 0.2s; }
  .galeria-dots { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:5px; }
  .dot { width:7px; height:7px; border-radius:50%; background:rgba(0,0,0,0.2); cursor:pointer; transition:background 0.2s; }
  .dot.active { background:#7c3aed; }
  .btn-nav { position:absolute; top:50%; transform:translateY(-50%); background:white; border:none; border-radius:50%; width:34px; height:34px; font-size:1rem; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.15); display:flex; align-items:center; justify-content:center; opacity:0.85; }
  .btn-nav:hover { opacity:1; }
  .btn-prev { left:10px; }
  .btn-next { right:10px; }

  /* INFO */
  .info { padding:20px; }
  .marca { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#7c3aed; margin-bottom:6px; }
  .nombre { font-size:1.15rem; font-weight:900; line-height:1.3; margin-bottom:4px; }
  .codigo { font-size:0.75rem; color:#94a3b8; font-family:Arial,sans-serif; margin-bottom:14px; }
  .precio { font-size:2rem; font-weight:900; color:#7c3aed; margin-bottom:4px; }
  .sin-stock { display:inline-block; background:#fee2e2; color:#ef4444; font-size:0.72rem; font-weight:700; padding:3px 10px; border-radius:20px; margin-bottom:12px; }
  .en-stock { display:inline-block; background:#dcfce7; color:#16a34a; font-size:0.72rem; font-weight:700; padding:3px 10px; border-radius:20px; margin-bottom:12px; }

  /* BOTONES */
  .btns { display:grid; gap:10px; margin-top:16px; }
  .btn-comprar { background:#7c3aed; color:white; border:none; border-radius:12px; padding:14px; font-size:0.95rem; font-weight:900; cursor:pointer; width:100%; }
  .btn-comprar:hover { background:#6d28d9; }
  .btn-comprar:disabled { background:#cbd5e1; cursor:not-allowed; }
  .btn-wsp { background:#25d366; color:white; border:none; border-radius:12px; padding:14px; font-size:0.95rem; font-weight:900; cursor:pointer; width:100%; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-wsp:hover { background:#22c55e; }
  .btn-compartir { background:white; color:#7c3aed; border:2px solid #7c3aed; border-radius:12px; padding:12px; font-size:0.88rem; font-weight:700; cursor:pointer; width:100%; }
  .btn-compartir:hover { background:#f5f3ff; }

  /* DESCRIPCIÓN */
  .descripcion { padding:16px 20px; border-top:1px solid #f1f5f9; color:#475569; font-size:0.88rem; line-height:1.6; }

  /* LOADING / ERROR */
  .estado { text-align:center; padding:60px 20px; color:#94a3b8; }
  .estado-icon { font-size:3rem; margin-bottom:12px; }
  .estado h2 { font-size:1.1rem; font-weight:700; margin-bottom:6px; color:#64748b; }
  .estado p { font-size:0.85rem; }

  /* TOAST */
  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:#1e293b; color:white; border-radius:10px; padding:10px 20px; font-size:0.85rem; font-weight:700; z-index:999; opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; }
</style>
</head>
<body>

<div class="header">
  <a href="https://blinkymdq.com"><img src="https://blinkymdq.com/blinkysinfondo.png" alt="Blinky MDQ"></a>
  <a href="https://blinkymdq.com" class="btn-tienda">🛍 Ver tienda</a>
</div>

<div class="container">
  <div id="contenido">
    <div class="estado">
      <div class="estado-icon">⏳</div>
      <h2>Cargando producto...</h2>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPA_URL = 'https://fcaytkwcypktvrmerexp.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjYXl0a3djeXBrdHZybWVyZXhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDU1OTYsImV4cCI6MjA5NzM4MTU5Nn0.7GiUl0o_B3dAnpE2x98sBqtC0eY9HoM6p67fOBghoJY';
const NRO_WSP = '5492235910492'; // ← cambiá por tu número

function getImgUrl(foto) {
  if (!foto || foto.trim() === '') return '';
  if (foto.startsWith('http')) return foto;
  if (foto.includes('id=')) return `https://drive.google.com/thumbnail?id=${foto.split('id=')[1].split('&')[0]}&sz=800`;
  return `https://blinkymdq.com/Productos/${foto}.jpg`;
}

function formatPrecio(v) {
  const n = parseFloat(String(v).replace(/[^0-9.]/g,''));
  if (isNaN(n)) return '$0';
  return '$' + Math.round(n).toLocaleString('es-AR');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; }, 2500);
}

let fotos = [];
let fotoActual = 0;

function mostrarFoto(idx) {
  fotoActual = idx;
  const img = document.getElementById('foto-principal');
  if (img) img.src = getImgUrl(fotos[idx]);
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===idx));
}

function fotoAnterior() { if (fotoActual > 0) mostrarFoto(fotoActual - 1); }
function fotoSiguiente() { if (fotoActual < fotos.length - 1) mostrarFoto(fotoActual + 1); }

async function cargarProducto() {
  const params = new URLSearchParams(window.location.search);
  const cod = params.get('cod');
  if (!cod) { mostrarError('No se especificó un producto.'); return; }

  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/productos?codigo=eq.${encodeURIComponent(cod)}&limit=1`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    const data = await res.json();
    if (!data.length) { mostrarError('Producto no encontrado.'); return; }
    renderProducto(data[0]);
  } catch(e) {
    mostrarError('Error al cargar el producto.');
  }
}

function renderProducto(p) {
  const precio = formatPrecio(p.precio_publico);
  const sinStock = !p.stock || p.stock <= 0;

  // Fotos (pueden ser múltiples separadas por coma)
  fotos = (p.foto || '').split(',').map(f => f.trim()).filter(Boolean);
  if (!fotos.length) fotos = [''];

  // Meta tags para compartir
  document.title = `${p.nombre} — Blinky MDQ`;
  document.getElementById('og-title').content = p.nombre;
  document.getElementById('og-description').content = `${precio} · Blinky MDQ`;
  if (fotos[0]) document.getElementById('og-image').content = getImgUrl(fotos[0]);
  document.getElementById('og-url').content = window.location.href;

  const mostrarNav = fotos.length > 1;

  document.getElementById('contenido').innerHTML = `
    <div class="card">
      <div class="galeria">
        <img id="foto-principal" src="${getImgUrl(fotos[0])}" alt="${p.nombre}" onerror="this.src='https://blinkymdq.com/blinkysinfondo.png'">
        ${mostrarNav ? `
          <button class="btn-nav btn-prev" onclick="fotoAnterior()">‹</button>
          <button class="btn-nav btn-next" onclick="fotoSiguiente()">›</button>
          <div class="galeria-dots">${fotos.map((_,i) => `<div class="dot ${i===0?'active':''}" onclick="mostrarFoto(${i})"></div>`).join('')}</div>
        ` : ''}
      </div>
      <div class="info">
        ${p.marca ? `<div class="marca">${p.marca}</div>` : ''}
        <div class="nombre">${p.nombre}</div>
        ${p.codigo ? `<div class="codigo">Cód. ${p.codigo}</div>` : ''}
        <div class="precio">${precio}</div>
        <div class="${sinStock ? 'sin-stock' : 'en-stock'}">${sinStock ? 'Sin stock' : '✓ Disponible'}</div>
        <div class="btns">
          <button class="btn-comprar" onclick="irAComprar('${p.codigo}')" ${sinStock ? 'disabled' : ''}>
            🛒 ${sinStock ? 'Sin stock' : 'Comprar en la tienda'}
          </button>
          <button class="btn-wsp" onclick="consultarWsp('${p.nombre}', '${precio}')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.09.536 4.05 1.475 5.757L0 24l6.435-1.438A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.374l-.36-.213-3.717.831.888-3.618-.234-.372A9.818 9.818 0 1112 21.818z"/></svg>
            Consultar por WhatsApp
          </button>
          <button class="btn-compartir" onclick="compartir('${p.nombre}', '${precio}')">🔗 Compartir</button>
        </div>
      </div>
      ${p.descripcion ? `<div class="descripcion">${p.descripcion}</div>` : ''}
    </div>
  `;
}

function irAComprar(cod) {
  window.location.href = `https://blinkymdq.com?q=${encodeURIComponent(cod)}`;
}

function consultarWsp(nombre, precio) {
  const msg = `Hola! Me interesa el producto: *${nombre}* (${precio}). ¿Está disponible?`;
  window.open(`https://wa.me/${NRO_WSP}?text=${encodeURIComponent(msg)}`, '_blank');
}

async function compartir(nombre, precio) {
  const url = window.location.href;
  if (navigator.share) {
    try {
      await navigator.share({ title: nombre, text: `${nombre} · ${precio}`, url });
    } catch(e) {}
  } else {
    navigator.clipboard.writeText(url);
    toast('Link copiado ✓');
  }
}

function mostrarError(msg) {
  document.getElementById('contenido').innerHTML = `
    <div class="estado">
      <div class="estado-icon">😕</div>
      <h2>Oops</h2>
      <p>${msg}</p>
      <br>
      <a href="https://blinkymdq.com" class="btn-tienda" style="display:inline-block;margin-top:8px;">Ver tienda</a>
    </div>
  `;
}

cargarProducto();
</script>
</body>
</html>
